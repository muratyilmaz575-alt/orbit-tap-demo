<!DOCTYPE html>
<html lang="de">
<head>
  <!-- Orbit Dash V35 Presentation Build: stable local HTML test version -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Orbit Dash</title>
  <style>
    :root{
      --bg1:#07101f;
      --bg2:#102243;
      --cyan:#35e7ff;
      --pink:#ff4fd8;
      --gold:#ffd166;
      --green:#73ff9b;
      --red:#ff5f7a;
      --glass:rgba(255,255,255,.10);
      --line:rgba(255,255,255,.16);
      --text:#ffffff;
      --muted:#b8c3d8;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{
      margin:0;height:100%;overflow:hidden;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 52% 0%, rgba(53,231,255,.16), transparent 34%),
        radial-gradient(circle at 84% 18%, rgba(255,79,216,.13), transparent 24%),
        radial-gradient(circle at 14% 92%, rgba(255,209,102,.10), transparent 22%),
        linear-gradient(160deg,var(--bg2),var(--bg1) 55%, #040712);
    }
    .app{
      width:100%;height:100%;
      display:flex;align-items:center;justify-content:center;
      padding:10px;
    }
    .phone{
      width:min(100%,520px);
      height:100%;
      max-height:930px;
      display:grid;
      grid-template-rows:auto auto minmax(0,1fr) auto;
      gap:8px;
      position:relative;
    }
    .top{display:flex;gap:8px;align-items:stretch}
    .brand,.stat,.hint{
      border:1px solid var(--line);
      background:var(--glass);
      backdrop-filter:blur(14px);
      box-shadow:0 18px 50px rgba(0,0,0,.28);
      border-radius:24px;
    }
    .brand{flex:1;padding:12px 14px;min-width:0}
    .label{
      font-size:10px;line-height:1;letter-spacing:.24em;color:#a8f5ff;font-weight:950;text-transform:uppercase;
    }
    .brand h1{margin:4px 0 1px;font-size:31px;line-height:1;letter-spacing:-.07em}
    .brand p{
      margin:5px 0 0;color:var(--muted);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    }
    .stat{min-width:92px;padding:10px 11px;text-align:right}
    .stat b{display:block;margin-top:4px;font-size:23px;line-height:1}
    .hint{padding:10px 13px}
    .hintMain{font-size:13px;line-height:1.25;color:#e8f2ff}
    .hintSmall{margin-top:3px;color:var(--muted);font-size:11px}
    .gameWrap{
      position:relative;min-height:0;overflow:hidden;
      border:1px solid rgba(255,255,255,.18);
      background:rgba(2,6,23,.72);
      border-radius:30px;padding:7px;
      box-shadow:inset 0 0 55px rgba(53,231,255,.12),0 26px 95px rgba(0,0,0,.48),0 0 0 1px rgba(255,255,255,.04);
      touch-action:none;
    }
    canvas{width:100%;height:100%;display:block;border-radius:24px}
    .hud{
      position:absolute;left:14px;right:14px;top:12px;display:flex;gap:7px;justify-content:space-between;flex-wrap:wrap;pointer-events:none;z-index:5;
    }
    .coinHud{
      color:#ffe7a3;
      border-color:rgba(255,209,102,.28)!important;
      background:rgba(255,209,102,.12)!important;
      box-shadow:0 10px 25px rgba(0,0,0,.20),0 0 18px rgba(255,209,102,.10)!important;
    }
    .hudPill{
      border:1px solid rgba(255,255,255,.15);
      background:rgba(8,15,29,.56);
      backdrop-filter:blur(10px);
      border-radius:999px;padding:7px 10px;font-size:12px;font-weight:950;
      box-shadow:0 10px 25px rgba(0,0,0,.20);white-space:nowrap;
    }
    .centerMsg{
      position:absolute;left:50%;top:48%;transform:translate(-50%,-50%) scale(.92);
      z-index:8;text-align:center;pointer-events:none;transition:.16s ease;opacity:0;
      text-shadow:0 0 30px rgba(255,255,255,.85);
      width:min(82%,360px);
    }
    .centerMsg.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
    .centerMsg .big{font-size:54px;font-weight:1000;line-height:1;letter-spacing:-.08em}
    .centerMsg .small{margin-top:6px;font-size:13px;font-weight:950;letter-spacing:.16em;text-transform:uppercase;color:#eaf7ff}
    .bigScore{
      position:absolute;
      left:50%;
      top:22%;
      transform:translateX(-50%);
      z-index:4;
      pointer-events:none;
      font-size:72px;
      line-height:1;
      font-weight:1000;
      letter-spacing:-.08em;
      color:rgba(255,255,255,.18);
      text-shadow:0 0 28px rgba(53,231,255,.18);
    }
    .runEndCard{
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      z-index:9;
      width:min(84%,330px);
      border:1px solid rgba(255,255,255,.18);
      background:linear-gradient(160deg,rgba(8,15,29,.76),rgba(8,15,29,.52));
      backdrop-filter:blur(12px);
      border-radius:28px;
      padding:15px;
      text-align:center;
      box-shadow:0 24px 70px rgba(0,0,0,.42),0 0 30px rgba(53,231,255,.10);
      pointer-events:none;
    }
    .runEndTitle{
      font-size:13px;
      font-weight:1000;
      letter-spacing:.18em;
      text-transform:uppercase;
      color:#a8f5ff;
    }
    .runEndScore{
      margin-top:6px;
      font-size:52px;
      line-height:1;
      font-weight:1000;
      letter-spacing:-.08em;
      color:#ffffff;
      text-shadow:0 0 24px rgba(255,255,255,.32);
    }
    .runEndGrid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
      margin-top:12px;
    }
    .runEndMini{
      border:1px solid rgba(255,255,255,.11);
      background:rgba(255,255,255,.07);
      border-radius:18px;
      padding:9px 8px;
    }
    .runEndMini b{
      display:block;
      font-size:18px;
      line-height:1;
      color:#ffe7a3;
    }
    .runEndMini span{
      display:block;
      margin-top:4px;
      font-size:10px;
      font-weight:900;
      color:var(--muted);
      letter-spacing:.10em;
      text-transform:uppercase;
    }
    .runEndGoal{
      margin-top:10px;
      padding:9px;
      border-radius:18px;
      background:rgba(255,209,102,.10);
      border:1px solid rgba(255,209,102,.20);
      color:#fff1c2;
      font-size:12px;
      line-height:1.3;
      font-weight:850;
    }
    .runEndTap{
      margin-top:10px;
      color:#ffffff;
      font-size:12px;
      font-weight:1000;
      letter-spacing:.14em;
      text-transform:uppercase;
    }
    .bottomMsg{
      position:absolute;left:50%;bottom:16px;transform:translateX(-50%);
      z-index:6;pointer-events:none;
      border:1px solid rgba(255,255,255,.17);
      background:rgba(8,15,29,.58);
      backdrop-filter:blur(10px);
      border-radius:999px;padding:8px 13px;font-size:12px;font-weight:950;
      box-shadow:0 10px 25px rgba(0,0,0,.22);max-width:84%;text-align:center;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    }
    .controls{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
    button{
      border:1px solid rgba(255,255,255,.16);
      background:linear-gradient(180deg,rgba(255,255,255,.14),rgba(255,255,255,.08));
      color:#fff;font-weight:950;border-radius:18px;min-height:44px;font-size:13px;
      box-shadow:0 12px 28px rgba(0,0,0,.20);backdrop-filter:blur(10px);cursor:pointer;font-family:inherit;
    }
    button:active{transform:scale(.96)}
    .wide{grid-column:span 2}
    .primary{background:linear-gradient(135deg,rgba(53,231,255,.35),rgba(255,79,216,.27))}
    .danger{background:linear-gradient(135deg,rgba(255,95,122,.32),rgba(255,209,102,.20))}
    .overlay{
      position:absolute;inset:0;z-index:20;display:flex;align-items:center;justify-content:center;
      padding:14px;background:rgba(2,6,23,.74);backdrop-filter:blur(11px);
    }
    .modal{
      width:min(94%,390px);max-height:96%;overflow:auto;
      border:1px solid rgba(255,255,255,.18);
      background:linear-gradient(160deg,rgba(255,255,255,.15),rgba(255,255,255,.08));
      border-radius:30px;padding:18px;box-shadow:0 24px 70px rgba(0,0,0,.48);text-align:center;
    }
    .modal h2{margin:5px 0 8px;font-size:29px;letter-spacing:-.06em}
    .modal p{margin:0 0 13px;color:var(--muted);font-size:13px;line-height:1.38}
    .menuGrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:12px}
    .bestCard{
      margin:12px 0 10px;
      border:1px solid rgba(255,255,255,.15);
      background:rgba(2,6,23,.30);
      border-radius:22px;
      padding:12px;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
      text-align:center;
    }
    .bestCard .num{
      font-size:26px;
      font-weight:1000;
      line-height:1;
      color:#ffffff;
      text-shadow:0 0 18px rgba(53,231,255,.35);
    }
    .bestCard .cap{
      margin-top:4px;
      font-size:10px;
      color:var(--muted);
      font-weight:900;
      letter-spacing:.12em;
      text-transform:uppercase;
    }
    .rankTabs{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
      margin-top:12px;
    }
    .rankTabs button{
      min-height:40px;
      border-radius:16px;
      font-size:12px;
    }
    .rankList{
      display:flex;
      flex-direction:column;
      gap:7px;
      margin-top:12px;
      text-align:left;
    }
    .rankRow{
      display:grid;
      grid-template-columns:38px 1fr 62px;
      gap:8px;
      align-items:center;
      padding:9px 10px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.11);
      background:rgba(2,6,23,.30);
      font-size:13px;
      font-weight:900;
    }
    .rankRow.me{
      border-color:rgba(255,209,102,.45);
      background:rgba(255,209,102,.13);
      box-shadow:0 0 18px rgba(255,209,102,.10);
    }
    .rankPos{color:#a8f5ff}
    .rankName{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .rankScore{text-align:right;color:#ffe7a3}
    .heroCard{
      margin-top:12px;
      border:1px solid rgba(255,255,255,.16);
      background:
        radial-gradient(circle at 30% 0%,rgba(53,231,255,.22),transparent 34%),
        radial-gradient(circle at 85% 15%,rgba(255,79,216,.16),transparent 30%),
        linear-gradient(160deg,rgba(255,255,255,.14),rgba(255,255,255,.06));
      border-radius:26px;
      padding:14px;
      text-align:left;
      box-shadow:0 18px 50px rgba(0,0,0,.25), inset 0 0 40px rgba(255,255,255,.04);
    }
    .heroTop{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }
    .heroLogo{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
    }
    .heroIcon{
      width:48px;
      height:48px;
      border-radius:18px;
      background:radial-gradient(circle at 35% 25%,#fff,var(--cyan) 45%,var(--pink));
      box-shadow:0 0 26px rgba(53,231,255,.35);
      flex:0 0 auto;
      position:relative;
      overflow:hidden;
    }
    .heroIcon:after{
      content:"";
      position:absolute;
      width:78px;
      height:18px;
      left:-16px;
      top:17px;
      background:rgba(255,255,255,.28);
      transform:rotate(-26deg);
      border-radius:999px;
    }
    .heroName{
      font-size:24px;
      font-weight:1000;
      line-height:1;
      letter-spacing:-.07em;
      color:#fff;
    }
    .heroTag{
      margin-top:4px;
      color:var(--muted);
      font-size:11px;
      font-weight:850;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .heroBadge{
      padding:8px 10px;
      border-radius:999px;
      border:1px solid rgba(255,209,102,.25);
      background:rgba(255,209,102,.12);
      color:#ffe7a3;
      font-weight:1000;
      font-size:12px;
      white-space:nowrap;
    }
    .quickStats{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:8px;
      margin-top:13px;
    }
    .quickStat{
      border:1px solid rgba(255,255,255,.11);
      background:rgba(2,6,23,.28);
      border-radius:18px;
      padding:10px 8px;
      text-align:center;
    }
    .quickStat b{
      display:block;
      font-size:20px;
      line-height:1;
      color:#fff;
      text-shadow:0 0 18px rgba(255,255,255,.20);
    }
    .quickStat span{
      display:block;
      margin-top:5px;
      font-size:9px;
      font-weight:900;
      letter-spacing:.13em;
      text-transform:uppercase;
      color:var(--muted);
    }
    .sectionTitle{
      margin:13px 0 7px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      color:#eaf7ff;
      font-size:12px;
      font-weight:1000;
      letter-spacing:.14em;
      text-transform:uppercase;
    }
    .sectionTitle small{
      color:var(--muted);
      letter-spacing:0;
      text-transform:none;
      font-weight:800;
    }
    .proGrid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:9px;
      margin-top:8px;
    }
    .proBtn{
      min-height:58px;
      border-radius:20px;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      gap:4px;
      font-size:14px;
      line-height:1;
    }
    .proBtn .ico{
      font-size:20px;
      line-height:1;
    }
    .proBtn .txt{
      font-weight:1000;
    }
    .proBtn .sub{
      font-size:9px;
      color:var(--muted);
      font-weight:900;
      letter-spacing:.10em;
      text-transform:uppercase;
    }
    .playBtnPro{
      min-height:64px!important;
      font-size:17px!important;
      border-radius:22px!important;
      background:linear-gradient(135deg,rgba(53,231,255,.42),rgba(255,79,216,.32),rgba(255,209,102,.20))!important;
      box-shadow:0 16px 36px rgba(0,0,0,.28),0 0 24px rgba(53,231,255,.16)!important;
    }
    .progressBox{
      margin-top:12px;
      border:1px solid rgba(255,255,255,.13);
      background:rgba(2,6,23,.30);
      border-radius:22px;
      padding:12px;
      text-align:left;
    }
    .progressTitle{font-size:13px;font-weight:1000;color:#fff}
    .progressSub{margin-top:4px;color:var(--muted);font-size:12px;line-height:1.35}
    .progressTrack{
      margin-top:9px;height:10px;border-radius:999px;background:rgba(255,255,255,.10);
      overflow:hidden;border:1px solid rgba(255,255,255,.10)
    }
    .progressFill{
      height:100%;border-radius:999px;
      background:linear-gradient(90deg,var(--cyan),var(--pink),var(--gold));
      box-shadow:0 0 16px rgba(53,231,255,.30)
    }
    .demoNotice{
      margin-top:12px;
      padding:10px 12px;
      border-radius:18px;
      border:1px solid rgba(53,231,255,.20);
      background:rgba(53,231,255,.08);
      color:#dff8ff;
      font-size:12px;
      line-height:1.35;
      text-align:left;
    }
    .demoNotice b{color:#fff}
    .shopScreen{
      margin-top:12px;
      border:1px solid rgba(255,255,255,.17);
      background:
        radial-gradient(circle at 25% 0%,rgba(255,209,102,.24),transparent 35%),
        radial-gradient(circle at 85% 18%,rgba(255,79,216,.18),transparent 32%),
        linear-gradient(160deg,rgba(255,255,255,.15),rgba(255,255,255,.06));
      border-radius:28px;
      padding:14px;
      text-align:left;
      box-shadow:0 22px 65px rgba(0,0,0,.32), inset 0 0 44px rgba(255,255,255,.04);
    }
    .shopHeader{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:12px;
    }
    .shopHeader h3{
      margin:0;
      font-size:24px;
      line-height:1;
      letter-spacing:-.07em;
    }
    .shopHeader p{
      margin:5px 0 0;
      color:var(--muted);
      font-size:12px;
      line-height:1.25;
    }
    .shopCoinBox{
      padding:8px 10px;
      border-radius:999px;
      border:1px solid rgba(255,209,102,.28);
      background:rgba(255,209,102,.13);
      color:#ffe7a3;
      font-size:13px;
      font-weight:1000;
      white-space:nowrap;
    }
    .shopTabs{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
      margin-bottom:12px;
    }
    .shopTabs button{
      min-height:42px;
      border-radius:16px;
      font-size:12px;
    }
    .itemGrid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }
    .itemCard{
      position:relative;
      overflow:hidden;
      min-height:158px;
      border:1px solid rgba(255,255,255,.14);
      background:
        radial-gradient(circle at 50% 0%,rgba(255,255,255,.18),transparent 42%),
        rgba(2,6,23,.36);
      border-radius:24px;
      padding:12px 10px;
      text-align:center;
      box-shadow:0 14px 34px rgba(0,0,0,.22);
    }
    .itemCard.active{
      border-color:rgba(255,209,102,.62);
      background:
        radial-gradient(circle at 50% 0%,rgba(255,209,102,.24),transparent 44%),
        rgba(255,209,102,.11);
      box-shadow:0 0 24px rgba(255,209,102,.14),0 14px 34px rgba(0,0,0,.22);
    }
    .itemCard.locked{
      opacity:.92;
    }
    .itemPreview{
      height:54px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:40px;
      line-height:1;
      filter:drop-shadow(0 0 13px rgba(255,255,255,.28));
    }
    .itemName{
      margin-top:5px;
      font-size:15px;
      font-weight:1000;
      line-height:1.1;
      color:#fff;
    }
    .itemSub{
      margin-top:4px;
      font-size:10px;
      font-weight:850;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:var(--muted);
    }
    .rarity{
      display:inline-flex;
      margin-top:8px;
      padding:4px 8px;
      border-radius:999px;
      font-size:9px;
      font-weight:1000;
      letter-spacing:.12em;
      text-transform:uppercase;
      border:1px solid rgba(255,255,255,.14);
    }
    .rCommon{color:#dbeafe;background:rgba(219,234,254,.10);border-color:rgba(219,234,254,.20)}
    .rRare{color:#93c5fd;background:rgba(59,130,246,.13);border-color:rgba(59,130,246,.28)}
    .rEpic{color:#d8b4fe;background:rgba(168,85,247,.15);border-color:rgba(168,85,247,.32)}
    .rLegendary{color:#fde68a;background:rgba(245,158,11,.18);border-color:rgba(245,158,11,.40)}
    .buyBtn{
      margin-top:9px;
      width:100%;
      min-height:36px;
      border-radius:14px;
      font-size:12px;
      background:linear-gradient(135deg,rgba(255,209,102,.30),rgba(255,79,216,.14));
    }
    .buyBtn.owned{
      background:rgba(255,255,255,.08);
      color:#dbeafe;
    }
    .buyBtn.active{
      background:linear-gradient(135deg,rgba(115,255,155,.26),rgba(53,231,255,.14));
      color:#d9ffe5;
    }
    .priceBadge{
      margin-top:7px;display:inline-flex;align-items:center;justify-content:center;
      min-width:64px;padding:4px 7px;border-radius:999px;
      background:rgba(255,209,102,.14);border:1px solid rgba(255,209,102,.25);
      color:#ffe7a3;font-size:10px;font-weight:1000
    }
    .choiceGrid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:9px;
      margin-top:12px;
    }
    .choiceCard{
      border:1px solid rgba(255,255,255,.14);
      background:rgba(2,6,23,.30);
      border-radius:18px;
      padding:12px 10px;
      text-align:center;
      min-height:88px;
    }
    .choiceCard.active{
      border-color:rgba(255,209,102,.50);
      background:rgba(255,209,102,.10);
      box-shadow:0 0 18px rgba(255,209,102,.10);
    }
    .choiceEmoji{
      font-size:26px;
      line-height:1;
      margin-bottom:6px;
    }
    .choiceTitle{
      font-size:13px;
      font-weight:1000;
      line-height:1.1;
      color:#fff;
    }
    .choiceSub{
      margin-top:4px;
      font-size:10px;
      font-weight:800;
      color:var(--muted);
      letter-spacing:.08em;
      text-transform:uppercase;
    }
    .friendList{
      display:flex;
      flex-direction:column;
      gap:8px;
      margin-top:12px;
      text-align:left;
    }
    .friendRow{
      display:grid;
      grid-template-columns:40px 1fr 58px;
      gap:9px;
      align-items:center;
      padding:10px;
      border-radius:18px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(2,6,23,.30);
      font-weight:900;
    }
    .friendRow.me{
      border-color:rgba(255,209,102,.48);

<script>
const STORAGE = "orbit_tap_v2";
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const els = {
  phone: document.getElementById("phone"),
  overlay: document.getElementById("overlay"),
  modal: document.getElementById("modal"),
  touchArea: document.getElementById("touchArea"),
  coinsTop: document.getElementById("coinsTop"),
  score: document.getElementById("score"),
  runCoinsHud: document.getElementById("runCoinsHud"),
  best: document.getElementById("best"),
  speed: document.getElementById("speed"),
  powerHud: document.getElementById("powerHud"),
  centerMsg: document.getElementById("centerMsg"),
  centerBig: document.getElementById("centerBig"),
  centerSmall: document.getElementById("centerSmall"),
  bottomMsg: document.getElementById("bottomMsg"),
  bigScore: document.getElementById("bigScore"),
  runEndCard: document.getElementById("runEndCard")
};

const COLORS = {
  cyan:"#35e7ff",
  pink:"#ff4fd8",
  gold:"#ffd166",
  green:"#73ff9b",
  red:"#ff5f7a",
  white:"#ffffff",
  bg1:"#07101f",
  bg2:"#102243"
};

let width = 420, height = 700, dpr = 1;
let save = loadSave();
let status = "menu";
let score = 0, coinsRun = 0, gameSpeed = 0.88;
let bestBeforeRun = 0;
let dailyMode = false;
let dailyDateKey = '';
let dailySeed = 1;
let rngState = 1;
let screenShake = 0, lastTime = 0, bgT = 0;
let particles = [];
let shockwaves = [];
let coinPopups = [];
let stars = [];
let hills1 = [], hills2 = [];
let audioCtx = null;
let musicNodes = null;
let musicStarted = false;
let musicIntensity = 0;

let player = null;
let obstacles = [];
let obstacleCount = 0;
let gatesSinceShieldSpawn = 999;
let lastRunScore = 0;
let powerups = [];
let powerupSpawnTimer = 0;
let shieldActive = false;
let shieldTimer = 0;
let shieldGraceTimer = 0;
let lastShieldScore = -999;
let slowTimer = 0;
let coinBoostTimer = 0;
let highscoreWarned = false;
let newBestShown = false;
let spawnTimer = 0;
let specialGateCooldown = 0;

function defaultSave(){
  return {coins:0,best:0,sound:true,music:true,theme:'neon',skin:'orb',unlockedThemes:['neon'],unlockedSkins:['orb'],dailyBest:{}};
}
function loadSave(){
  try{
    const data = JSON.parse(localStorage.getItem(STORAGE) || "{}");
    const merged = {...defaultSave(), ...data};
    if(typeof merged.music !== 'boolean') merged.music = true;
    if(!merged.dailyBest || typeof merged.dailyBest !== 'object') merged.dailyBest = {};
    if(!Array.isArray(merged.unlockedThemes)) merged.unlockedThemes = ['neon'];
    if(!Array.isArray(merged.unlockedSkins)) merged.unlockedSkins = ['orb'];
    if(!merged.unlockedThemes.includes('neon')) merged.unlockedThemes.push('neon');
    if(!merged.unlockedSkins.includes('orb')) merged.unlockedSkins.push('orb');
    return merged;
  }catch(e){
    return defaultSave();
  }
}
function saveGame(){
  localStorage.setItem(STORAGE, JSON.stringify(save));
  updateHud();
}
function updateHud(){
  els.coinsTop.textContent = save.coins;
  els.score.textContent = score;
  if(els.runCoinsHud) els.runCoinsHud.textContent = coinsRun;
  els.best.textContent = save.best;
  els.speed.textContent = gameSpeed.toFixed(1);
  if(els.bigScore) els.bigScore.textContent = score;
  if(els.powerHud){
    const active = [];
    if(shieldActive || shieldGraceTimer > 0) active.push(shieldActive ? "🛡️1" : "🛡️");
    if(slowTimer > 0) active.push("⏱️");
    if(coinBoostTimer > 0) active.push("🪙x2");
    els.powerHud.textContent = active.length ? active.join(" ") : "–";
  }
}
function seededRandom(){
  // einfacher deterministischer Generator für Daily Challenge
  rngState = (rngState * 1664525 + 1013904223) >>> 0;
  return rngState / 4294967296;
}
function gameRandom(){
  return dailyMode ? seededRandom() : Math.random();
}
function rand(min,max){ return min + gameRandom() * (max - min); }
function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }
function dist(ax,ay,bx,by){ return Math.hypot(ax-bx, ay-by); }
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }


function ensureAudioContext(){
  try{
    const AC = window.AudioContext || window.webkitAudioContext;
    if(!AC) return null;
    if(!audioCtx) audioCtx = new AC();
    if(audioCtx.state === "suspended") audioCtx.resume().catch(()=>{});
    return audioCtx;
  }catch(e){
    return null;
  }
}

function startAmbientMusic(){
  if(!save.music) return;
  const ac = ensureAudioContext();
  if(!ac) return;

  // Falls ein alter Musik-Loop noch hängt, sauber ersetzen.
  if(musicStarted) return;

  try{
    // V23: bewusst hörbarer, aber eigener prozeduraler Game-Loop.
    // Keine Audiodatei, keine Samples, kein fremdes Material.
    const master = ac.createGain();
    master.gain.setValueAtTime(0.0001, ac.currentTime);
    master.gain.linearRampToValueAtTime(0.38, ac.currentTime + 0.8);
    master.connect(ac.destination);

    const musicBus = ac.createGain();
    musicBus.gain.setValueAtTime(0.9, ac.currentTime);

    const filter = ac.createBiquadFilter();
    filter.type = "lowpass";
    filter.frequency.setValueAtTime(2600, ac.currentTime);
    filter.Q.setValueAtTime(0.8, ac.currentTime);

    const delay = ac.createDelay();
    delay.delayTime.setValueAtTime(0.18, ac.currentTime);
    const delayGain = ac.createGain();
    delayGain.gain.setValueAtTime(0.18, ac.currentTime);

    musicBus.connect(filter);
    filter.connect(master);
    filter.connect(delay);
    delay.connect(delayGain);
    delayGain.connect(master);

    const active = [];
    let step = 0;

    // Eigene einfache Akkordfolge, ruhig und loopbar.
    const chords = [
      [261.63, 329.63, 392.00],    // C major
      [293.66, 369.99, 440.00],    // D bright
      [329.63, 392.00, 493.88],    // E/G/B
      [392.00, 493.88, 587.33]     // G/B/D
    ];
    const melody = [523.25, 587.33, 659.25, 783.99, 659.25, 587.33, 523.25, 659.25];

    function playTone(freq, start, dur, type, vol, pan=0){
      const o = ac.createOscillator();
      const g = ac.createGain();
      const p = ac.createStereoPanner ? ac.createStereoPanner() : null;

      o.type = type;
      o.frequency.setValueAtTime(freq, start);

      g.gain.setValueAtTime(0.0001, start);
      g.gain.linearRampToValueAtTime(vol, start + 0.025);
      g.gain.exponentialRampToValueAtTime(0.0001, start + dur);

      if(p){
        p.pan.setValueAtTime(pan, start);
        o.connect(g);
        g.connect(p);
        p.connect(musicBus);
      }else{
        o.connect(g);
        g.connect(musicBus);
      }

      o.start(start);
      o.stop(start + dur + 0.05);
      active.push(o);
    }

    function playKick(start){
      // sehr weicher kurzer Bass-Klick, damit es mehr nach Loop klingt
      const o = ac.createOscillator();
      const g = ac.createGain();
      o.type = "sine";
      o.frequency.setValueAtTime(120, start);
      o.frequency.exponentialRampToValueAtTime(72, start + 0.18);
      g.gain.setValueAtTime(0.0001, start);
      g.gain.linearRampToValueAtTime(0.18, start + 0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, start + 0.22);
      o.connect(g);
      g.connect(musicBus);
      o.start(start);
      o.stop(start + 0.24);
      active.push(o);
    }

    function scheduleStep(){
      if(!save.music || !musicStarted || !musicNodes) return;

      const now = ac.currentTime + 0.03;
      const chordIndex = Math.floor(step / 8) % chords.length;
      const chord = chords[chordIndex];

      // Akkord alle 4 Steps
      if(step % 4 === 0){
        chord.forEach((freq, i)=>{
          playTone(freq, now + i*0.012, 0.72, i === 1 ? "triangle" : "sine", 0.145, (i-1)*0.15);
        });
      }

      // kleine Melodie auf Offbeats
      if(step % 2 === 1 || step % 8 === 4){
        const m = melody[(step + chordIndex) % melody.length];
        playTone(m, now, 0.24, "triangle", 0.175, step % 4 === 1 ? -0.18 : 0.18);
      }

      // leiser Puls, aber kein nerviger Dauerton
      if(step % 4 === 0){
        playKick(now);
      }

      // kleiner fröhlicher Akzent, selten genug, damit es nicht nervt
      if(step % 8 === 6){
        playTone(1046.50, now + 0.03, 0.16, "sine", 0.095, 0.05);
      }

      step++;
    }

    const interval = setInterval(scheduleStep, 300);

    musicNodes = {master, musicBus, filter, delay, delayGain, interval, active};
    musicStarted = true;

    // Direkt hörbar starten
    scheduleStep();
    setTimeout(scheduleStep, 160);
    setTimeout(scheduleStep, 310);

  }catch(e){
    musicNodes = null;
    musicStarted = false;
  }
}

function stopAmbientMusic(){
  if(!musicNodes || !audioCtx){
    musicNodes = null;
    musicStarted = false;
    return;
  }

  const ac = audioCtx;
  try{
    musicNodes.master.gain.cancelScheduledValues(ac.currentTime);
    musicNodes.master.gain.setValueAtTime(Math.max(0.0001, musicNodes.master.gain.value || 0.0001), ac.currentTime);
    musicNodes.master.gain.linearRampToValueAtTime(0.0001, ac.currentTime + 0.22);
    if(musicNodes.interval) clearInterval(musicNodes.interval);

    const nodes = musicNodes;
    setTimeout(() => {
      try{
        nodes.active.forEach(o => { try{o.stop();}catch(e){} });
      }catch(e){}
    }, 260);
  }catch(e){}

  musicNodes = null;
  musicStarted = false;
}

function updateAmbientMusic(){
  if(!save.music){
    stopAmbientMusic();
    return;
  }
  if(!musicStarted || !audioCtx || !musicNodes) return;

  try{
    const ac = audioCtx;
    const target = status === "playing" ? Math.min(1, score / 45) : 0.12;
    musicIntensity += (target - musicIntensity) * 0.025;

    // Laut genug, aber noch unter den Effekten.
    const vol = status === "dead" ? 0.22 : 0.38 + musicIntensity * 0.06;
    musicNodes.master.gain.setTargetAtTime(vol, ac.currentTime, 0.35);
    musicNodes.filter.frequency.setTargetAtTime(2300 + musicIntensity * 1200, ac.currentTime, 0.45);
  }catch(e){}
}

function unlockAudio(){
  const ac = ensureAudioContext();
  if(!ac || !save.music) return;

  try{
    const g = ac.createGain();
    const o = ac.createOscillator();
    g.gain.setValueAtTime(0.0001, ac.currentTime);
    o.connect(g);
    g.connect(ac.destination);
    o.start();
    o.stop(ac.currentTime + 0.02);
  }catch(e){}

  startAmbientMusic();
}

function beep(type){


  if(!save.sound) return;
  const ac = ensureAudioContext();
  if(!ac) return;

  try{
    const o = ac.createOscillator();
    const g = ac.createGain();
    o.connect(g);
    g.connect(ac.destination);
    const now = ac.currentTime;
    const map = {
      flap:[520,.08,"triangle",.055],
      pass:[820,.12,"sine",.065],
      fail:[120,.32,"sawtooth",.070],
      start:[620,.14,"triangle",.050],
      combo:[980,.14,"triangle",.070],
      coin:[1320,.08,"triangle",.060],
      coin:[1320,.08,"triangle",.060]
    };
    const [freq,dur,wave,vol] = map[type] || map.flap;
    o.type = wave;
    o.frequency.setValueAtTime(freq, now);
    if(type === "pass" || type === "combo") o.frequency.exponentialRampToValueAtTime(freq*1.6, now+dur);
    if(type === "fail") o.frequency.exponentialRampToValueAtTime(45, now+dur);
    g.gain.setValueAtTime(vol, now);
    g.gain.exponentialRampToValueAtTime(0.0001, now+dur);
    o.start(now);
    o.stop(now+dur);
  }catch(e){}
}

function resize(){
  const rect = canvas.parentElement.getBoundingClientRect();
  dpr = window.devicePixelRatio || 1;
  width = rect.width - 14;
  height = rect.height - 14;
  canvas.width = Math.floor(width*dpr);
  canvas.height = Math.floor(height*dpr);
  canvas.style.width = width + "px";
  canvas.style.height = height + "px";
  ctx.setTransform(dpr,0,0,dpr,0,0);
  makeStars();
  makeHills();
  draw();
}
window.addEventListener("resize", resize);

function makeStars(){
  stars = [];
  for(let i=0;i<70;i++){
    stars.push({
      x:rand(0,width),
      y:rand(0,height*.72),
      r:gameRandom()<.12?2.1:1.1,
      speed:rand(.2,1),
      phase:rand(0,Math.PI*2),
      c:i%4===0?COLORS.cyan:i%4===1?COLORS.pink:i%4===2?COLORS.gold:COLORS.white
    });
  }
}
function makeHills(){
  hills1 = [];
  hills2 = [];
  let x = 0;
  while(x < width + 400){
    hills1.push({x, w:rand(120,220), h:rand(50,100)});
    x += rand(90,170);
  }
  x = 0;
  while(x < width + 400){
    hills2.push({x, w:rand(160,260), h:rand(80,160)});
    x += rand(120,200);
  }
}

function showCenter(big, small, color="#ffffff", hold=650){
  els.centerBig.textContent = big;
  els.centerSmall.textContent = small || "";
  els.centerBig.style.color = color;
  els.centerMsg.classList.add("show");
  clearTimeout(showCenter.t);
  showCenter.t = setTimeout(()=>els.centerMsg.classList.remove("show"), hold);
}

function confetti(n=16){
  const colors=[COLORS.cyan,COLORS.pink,COLORS.gold,COLORS.green,COLORS.white];
  for(let i=0;i<n;i++){
    const p=document.createElement("div");
    p.className="confetti";
    p.style.left=(els.phone.clientWidth/2 + rand(-70,70))+"px";
    p.style.top=(els.phone.clientHeight*.42 + rand(-50,30))+"px";
    p.style.background=pick(colors);
    p.style.setProperty("--x",rand(-130,130)+"px");
    p.style.setProperty("--y",rand(100,260)+"px");
    els.phone.appendChild(p);
    setTimeout(()=>p.remove(),900);
  }
}
function spawnParticles(x,y,color,n=18, spread=120){
  for(let i=0;i<n;i++){
    particles.push({
      x,y,
      vx:rand(-spread,spread),
      vy:rand(-spread,spread),
      life:rand(.35,.95),
      size:rand(2,6),
      color
    });
  }
}
function shock(x,y,color,big=false){
  shockwaves.push({x,y,r:6,life:big?.85:.55,color,big});
}

function getTodayKey(){
  const d = new Date();
  return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
}

function seedFromString(str){
  let h = 2166136261;
  for(let i=0;i<str.length;i++){
    h ^= str.charCodeAt(i);
    h = Math.imul(h, 16777619);
  }
  return h >>> 0;
}

function getDailyBest(){
  const key = getTodayKey();
  return (save.dailyBest && save.dailyBest[key]) || 0;
}

function updateDailyBest(){
  if(!dailyMode) return;
  if(!save.dailyBest) save.dailyBest = {};
  const old = save.dailyBest[dailyDateKey] || 0;
  if(score > old){

    saveGame();
  }
}

function getSpeedForScore(s){
  if(s < 20) return 0.78 + s * 0.019;
  if(s < 55) return 1.16 + (s - 20) * 0.011;
  return Math.min(1.92, 1.55 + (s - 55) * 0.004);
}

function getGapForScore(s){
  // V4: etwas schwerer als V3, aber nicht unfair.
  // Start bleibt spielbar, ab Score 8 kommt mehr Druck.
  const base = height * 0.226;
  let shrink;
  if(s < 6) shrink = s * 0.10;
  else if(s < 15) shrink = 0.6 + (s - 6) * 0.34;
  else if(s < 30) shrink = 3.7 + (s - 15) * 0.24;
  else if(s < 55) shrink = 7.3 + (s - 30) * 0.13;
  else shrink = 10.6 + (s - 55) * 0.07;
  return clamp(base - shrink, 106, 154);
}

function getSpawnDelayForScore(s){
  // V4: nochmal 3-5% kürzer als V3.
  if(s < 6) return 1.18;
  if(s < 15) return 1.12;
  if(s < 30) return 1.07;
  if(s < 55) return 1.04;
  return 1.00;
}

function getGateCoinPosition(ob){
  const gapTop = ob.gapY - ob.gap / 2;
  const gapBottom = ob.gapY + ob.gap / 2;

  let cx = ob.x + ob.w / 2;
  if(ob.coinPlacement === "before") cx = ob.x - 34;
  if(ob.coinPlacement === "after") cx = ob.x + ob.w + 34;

  const cy = clamp(ob.gapY + (ob.coinOffsetY || 0), gapTop + 18, gapBottom - 18);
  return {x:cx, y:cy, r:10};
}

function drawGateCoins(ob){
  if(ob.coinCollected || ob.x + ob.w + 60 < 0) return;

  const coinValue = coinBoostTimer > 0 ? "x2" : "";
  const pos = getGateCoinPosition(ob);
  const pulse = Math.sin(bgT*7 + (ob.phase || 0)) * 1.5;

  ctx.save();
  ctx.translate(pos.x, pos.y);

  // outer glow
  ctx.shadowColor = COLORS.gold;
  ctx.shadowBlur = 18;
  ctx.fillStyle = COLORS.gold;
  ctx.globalAlpha = .92;
  ctx.beginPath();
  ctx.arc(0, 0, 7 + pulse*.25, 0, Math.PI*2);
  ctx.fill();

  // ring
  ctx.globalAlpha = .75;
  ctx.strokeStyle = "#fff7c7";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(0, 0, 10 + pulse*.25, 0, Math.PI*2);
  ctx.stroke();

  // coin face
  ctx.globalAlpha = .95;
  ctx.fillStyle = "#ffd84d";
  ctx.beginPath();
  ctx.ellipse(0, 0, 6.2, 7.4, 0, 0, Math.PI*2);
  ctx.fill();

  ctx.fillStyle = "#8a5a00";
  ctx.font = "900 9px system-ui";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText("C", 0, 0.6);

  if(coinValue){
    ctx.globalAlpha = .9;
    ctx.fillStyle = COLORS.gold;
    ctx.shadowColor = COLORS.gold;
    ctx.shadowBlur = 12;
    ctx.font = "900 10px system-ui";
    ctx.fillText(coinValue, 0, 22);
  }
  ctx.restore();
}

function tryCollectGateCoin(ob){
  if(ob.coinCollected || !player || status !== "playing") return;

  const pos = getGateCoinPosition(ob);
  const pickupRadius = Math.max(7, player.r + pos.r - 9);
  if(dist(player.x, player.y, pos.x, pos.y) <= pickupRadius){
    ob.coinCollected = true;

    const coinGain = (score % 5 === 0 ? 2 : 1) * (coinBoostTimer > 0 ? 2 : 1);
    coinsRun += coinGain;
    save.coins += coinGain;

    spawnCoinPopup(pos.x, pos.y - 18, coinGain);
    spawnParticles(pos.x, pos.y, COLORS.gold, coinGain >= 2 ? 18 : 12, 120);
    shock(pos.x, pos.y, COLORS.gold, false);
    beep("coin");
    updateHud();
    saveGame();
  }
}


function spawnPowerup(){
  if(score < 5) return;

  let type;
  const roll = gameRandom();

  // V4: Shield ist ein seltener Rettungsmoment, nicht Dauerzustand.
  // Erst ab Score 18 und nur, wenn genug Gates seit dem letzten Shield vergangen sind.
  if(score >= 18 && !shieldActive && gatesSinceShieldSpawn >= 36 && roll < 0.18){
    type = "shield";
    gatesSinceShieldSpawn = 0;
  }else{
    // Coins häufiger, Slow selten.
    type = roll < .78 ? "coin" : "slow";
  }

  const upcoming = obstacles
    .filter(ob => ob.x > player.x + 125 && !ob.powerupReserved)
    .sort((a,b) => a.x - b.x);

  if(!upcoming.length) return;

  const ob = upcoming[0];
  ob.powerupReserved = true;

  powerups.push({
    type,
    x: ob.x + ob.w / 2,
    y: ob.gapY,
    r: type === "shield" ? 16 : 15,
    pulse: rand(0, Math.PI*2),
    taken:false,
    attachedObstacle: ob
  });
}

function getPowerupColor(type){
  if(type === "shield") return COLORS.green;
  if(type === "slow") return COLORS.cyan;
  if(type === "coin") return COLORS.gold;
  return COLORS.white;
}

function getPowerupIcon(type){
  if(type === "shield") return "🛡";
  if(type === "slow") return "⏱";
  if(type === "coin") return "🪙";
  return "?";
}

function collectPowerup(p){
  p.taken = true;
  const color = getPowerupColor(p.type);
  spawnParticles(p.x, p.y, color, 22, 135);
  shock(p.x, p.y, color, true);
  screenShake = .25;

  if(p.type === "shield"){
    shieldActive = true;
    shieldTimer = 1;
  }else if(p.type === "slow"){
    slowTimer = 4.4;
  }else if(p.type === "coin"){
    coinBoostTimer = 7.0;
  }
  beep("combo");
  updateHud();
}

function drawPowerups(){
  for(const p of powerups){
    if(p.taken) continue;
    const color = getPowerupColor(p.type);
    p.pulse += .08;
    const r = p.r + Math.sin(p.pulse)*2.2;

    ctx.save();
    ctx.translate(p.x, p.y);

    ctx.shadowColor = color;
    ctx.shadowBlur = 24;
    ctx.fillStyle = color;
    ctx.globalAlpha = .88;
    ctx.beginPath();
    ctx.arc(0,0,r,0,Math.PI*2);
    ctx.fill();

    ctx.globalAlpha = .28;
    ctx.fillStyle = "#ffffff";
    ctx.beginPath();
    ctx.arc(-r*.25,-r*.28,r*.30,0,Math.PI*2);
    ctx.fill();

    ctx.globalAlpha = 1;
    ctx.strokeStyle = "#ffffff";
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.arc(0,0,r+6,0,Math.PI*2);
    ctx.stroke();

    // simple icon text
    ctx.shadowBlur = 0;
    ctx.fillStyle = "#06101f";
    ctx.font = "900 17px system-ui";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(getPowerupIcon(p.type), 0, 1);

    ctx.restore();
  }
}



function clampSectionY(y, gap){
  const margin = 62;
  return clamp(y, margin + gap/2, height - margin - gap/2);
}

function getSectionKind(i){
  // V4: 3er-Gates bleiben selten, aber kommen als echter Konzentrationsmoment.
  if(score < 14 || i < 9) return "normal";

  if(specialGateCooldown > 0){
    specialGateCooldown--;
    return "normal";
  }

  const theme = save.theme || 'neon';
  const baseChance = theme === 'lava' ? 0.070
                    : theme === 'ice' ? 0.060
                    : theme === 'nature' ? 0.052
                    : theme === 'sunset' ? 0.052
                    : 0.060;

  if(gameRandom() < baseChance){
    specialGateCooldown = 10 + Math.floor(gameRandom() * 6); // 10-15 normale Gates Abstand
    return "stair";
  }

  return "normal";
}

function sectionGapY(kind, gap, i){
  const mid = height * 0.50;
  const amp = Math.min(88, height * 0.155);

  if(kind === "stair"){
    const bias = (gameRandom() < 0.5 ? -1 : 1) * amp * rand(0.14, 0.30);
    return clampSectionY(mid + bias + rand(-amp * 0.10, amp * 0.10), gap);
  }

  return clampSectionY(mid + rand(-amp * 0.88, amp * 0.88), gap);
}

function spawnObstacle(){
  const i = obstacleCount++;
  const kind = getSectionKind(i);
  const gap = getGapForScore(score);

  const w = Math.max(58, Math.min(84, width * 0.115));
  const x = width + 88;
  const y = sectionGapY(kind, gap, i);
  const visualCount = kind === "stair" ? 3 : 1;
  const visualStep = w * 0.56;
  const sectionW = kind === "normal" ? w : w + visualStep * (visualCount - 1);
  const placements = gameRandom() < 0.62 ? ["inside"] : ["before", "after"];

  gatesSinceShieldSpawn++;

  // Coin ist nicht mehr immer bequem in der Mitte.
  // Manche Coins liegen näher am oberen/unteren Rand der Öffnung = Risiko/Belohnung.
  const riskyCoin = score >= 8 && gameRandom() < 0.46;
  const coinOffset = riskyCoin
    ? (gameRandom() < 0.5 ? -1 : 1) * rand(gap * 0.22, gap * 0.34)
    : rand(-gap * 0.12, gap * 0.12);

  obstacles.push({
    x,
    w: sectionW,
    pipeW: w,
    visualCount,
    visualStep,
    gapY: y,
    baseGapY: y,
    gap,
    baseGap: gap,
    passed:false,
    phase: rand(0, Math.PI*2),
    color: i % 2 === 0 ? COLORS.cyan : COLORS.pink,
    type: kind,
    gateKind: kind,
    stairDir: gameRandom() < 0.5 ? -1 : 1,
    motionAmp: 0,
    motionSpeed: 0,
    coinPlacement: placements[Math.floor(gameRandom() * placements.length)],
    coinOffsetY: coinOffset,
    coinCollected:false,
    bobAmp: 0,
    bobSpeed: 0,
    shardCount: Math.round(rand(4, 6)),
    styleTheme: save.theme || 'neon',
    visualVariant: Math.floor(gameRandom() * 4)
  });
}

function obstacleCollide(ob){
  if(player.x + player.r < ob.x || player.x - player.r > ob.x + ob.w) return false;

  let gapY = ob.gapY;
  if(ob.gateKind === "stair"){
    const t = clamp((player.x - ob.x) / Math.max(1, ob.w), 0, 1);
    const count = ob.visualCount || 1;
    const localStep = Math.min(28, height * 0.040) * (ob.stairDir || 1);
    gapY = clampSectionY(ob.gapY + (t * (count - 1) - (count - 1) / 2) * localStep, ob.gap);
  }

  const topEdge = gapY - ob.gap / 2;
  const bottomEdge = gapY + ob.gap / 2;
  const forgive = 2;

  if(player.y - player.r < topEdge + forgive) return true;
  if(player.y + player.r > bottomEdge - forgive) return true;
  return false;
}

function passObstacle(){
  score++;
  if(save.best > 3 && !highscoreWarned && score === save.best - 1){
    highscoreWarned = true;
    showCenter("BEST?", "Noch 1 Punkt", COLORS.gold, 520);

    showCenter("+"+score, "Hot streak", COLORS.gold, 480);
    confetti(16);
    beep("combo");
  }else{
    showCenter("+"+score, score < 5 ? "Easy..." : "Clean gate", COLORS.green, 320);
    beep("pass");
  }
}

function crash(reason="CRASH"){
  if(status === "dead") return;

  if(shieldGraceTimer > 0 && status === "playing"){
    return;
  }

  if(shieldActive && status === "playing"){
    shieldActive = false;
    shieldTimer = 0;
    shieldGraceTimer = 0.35;
    screenShake = .42;
    spawnParticles(player.x, player.y, COLORS.green, 28, 155);
    shock(player.x, player.y, COLORS.green, true);
    showCenter("SHIELD", "1 Treffer geblockt", COLORS.green, 460);
    beep("combo");

    player.vy = -Math.min(height*0.40, 280);
    player.y = clamp(player.y, 50 + player.r, height - 50 - player.r);

    for(const ob of obstacles){
      if(player.x + player.r > ob.x && player.x - player.r < ob.x + ob.w){
        ob.passed = true;
      }
    }

    updateHud();
    return;
  }

  document.body.classList.remove("cleanPlaying");
  lastRunScore = score;
  status = "dead";
  player.dead = true;
  screenShake = .9;
  spawnParticles(player.x, player.y, COLORS.red, 40, 200);
  shock(player.x, player.y, COLORS.red, true);
  showCenter("CRASH", reason, COLORS.red, 780);
  const nextUnlock = getNextUnlock();
  els.bottomMsg.textContent = nextUnlock ? `Noch ${Math.max(0,nextUnlock.cost - (save.coins || 0))} Coins bis ${nextUnlock.title}` : "Tippe für Neustart";
  beep("fail");
  updateHud();
  saveGame();
  setTimeout(showGameOver, 350);
}

function update(dt){
  bgT += dt;

  screenShake = Math.max(0, screenShake - dt*2.5);
  for(const s of stars){ s.phase += dt*s.speed; }

  for(const p of particles){
    p.x += p.vx*dt;
    p.y += p.vy*dt;
    p.vx *= (1 - dt*1.7);
    p.vy *= (1 - dt*1.4);
    p.life -= dt;
  }
  particles = particles.filter(p=>p.life > 0);

  for(const s of shockwaves){
    s.r += dt*(s.big ? 250 : 170);
    s.life -= dt;
  }
  shockwaves = shockwaves.filter(s=>s.life > 0);
  updateCoinPopups(dt);

  if(status !== "playing" && status !== "dead") return;
  if(!player) return;

  player.trail.unshift({x:player.x,y:player.y,life:1});
  if(player.trail.length > 20) player.trail.pop();
  player.trail.forEach(t => t.life *= .92);

  if(status === "playing"){
    slowTimer = Math.max(0, slowTimer - dt);
    shieldGraceTimer = Math.max(0, shieldGraceTimer - dt);
    coinBoostTimer = Math.max(0, coinBoostTimer - dt);

    // Slow Motion soll helfen, nicht stören:
    // Nur Gates/Welt werden langsamer. Die Figur bleibt normal steuerbar.
    const gravity = height * (score < 10 ? 1.08 : score < 25 ? 1.13 : score < 40 ? 1.16 : 1.20);
    player.vy += gravity * dt;
    player.y += player.vy * dt;
    player.rot = clamp(player.rot + dt*2.2, -0.55, 0.95);
    if(player.vy < 0) player.rot = -0.42;

    const speedPx = (width*0.49 + score*2.8) * gameSpeed * (slowTimer > 0 ? 0.50 : 1);
    spawnTimer -= dt;
    if(spawnTimer <= 0){
      spawnObstacle();
      spawnTimer = getSpawnDelayForScore(score);
    }

    powerupSpawnTimer -= dt;
    if(powerupSpawnTimer <= 0){
      spawnPowerup();
      powerupSpawnTimer = score >= 15 ? rand(7.0, 10.0) : rand(8.5, 12.5);
    }

    for(const p of powerups){
      if(p.attachedObstacle && obstacles.includes(p.attachedObstacle)){
        // exakt in der Öffnung des Gates halten
        p.x = p.attachedObstacle.x + p.attachedObstacle.w / 2;
        p.y = p.attachedObstacle.gapY;
      }else{
        p.x -= speedPx * dt;
      }

      if(!p.taken && dist(player.x, player.y, p.x, p.y) <= Math.max(7, player.r + p.r - 8)){
        collectPowerup(p);
      }
    }
    powerups = powerups.filter(p => p.x > -60 && !p.taken && (!p.attachedObstacle || obstacles.includes(p.attachedObstacle)));

    for(const ob of obstacles){
      ob.x -= speedPx * dt;
      ob.gapY = ob.baseGapY;
      ob.gap = ob.baseGap;

      // Coin wird sofort beim echten Berühren eingesammelt.
      tryCollectGateCoin(ob);

      if(!ob.passed && ob.x + ob.w < player.x){
        ob.passed = true;
        passObstacle();
      }
      if(obstacleCollide(ob)){
        crash("Gate getroffen");
      }
    }
    obstacles = obstacles.filter(ob => ob.x + ob.w > -120);

    if(player.y - player.r < 12 || player.y + player.r > height - 12){
      crash("Rand getroffen");
    }
  } else if(status === "dead"){
    player.vy += height*0.9 * dt;
    player.y += player.vy * dt;
    player.rot = clamp(player.rot + dt*3.2, -0.2, 1.2);
  }
}

function drawBackground(){
  const theme = save.theme || 'neon';

  if(theme === 'nature'){
    const bg = ctx.createLinearGradient(0,0,0,height);
    bg.addColorStop(0,"#7fd2ff");
    bg.addColorStop(.55,"#b9ecff");
    bg.addColorStop(1,"#daf7ff");
    ctx.fillStyle = bg;
    ctx.fillRect(0,0,width,height);

    // sun
    ctx.save();
    ctx.globalAlpha = .85;
    ctx.fillStyle = "#ffd76a";
    ctx.shadowColor = "#ffd76a";
    ctx.shadowBlur = 30;
    ctx.beginPath();
    ctx.arc(width*0.78, height*0.18, 34, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();

    // clouds
    for(let i=0;i<6;i++){
      const x = ((i*160) - bgT*30) % (width+180);
      const xx = x < -120 ? x + width + 180 : x;
      const y = 70 + (i%3)*42;
      ctx.save();
      ctx.globalAlpha = .50;
      ctx.fillStyle = "#ffffff";
      ctx.beginPath();
      ctx.arc(xx, y, 20, 0, Math.PI*2);
      ctx.arc(xx+22, y-10, 24, 0, Math.PI*2);
      ctx.arc(xx+48, y, 20, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    }

    // far hills
    ctx.save();
    ctx.fillStyle = "#8fd08c";
    for(const h of hills2){
      const x = (h.x - bgT*24) % (width + 320);
      const xx = x < -220 ? x + width + 320 : x;
      ctx.beginPath();
      ctx.moveTo(xx, height);
      ctx.quadraticCurveTo(xx+h.w/2, height-h.h*1.1, xx+h.w, height);
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();

    // near hills
    ctx.save();
    ctx.fillStyle = "#4e9d5b";
    for(const h of hills1){
      const x = (h.x - bgT*44) % (width + 260);
      const xx = x < -180 ? x + width + 260 : x;
      ctx.beginPath();
      ctx.moveTo(xx, height);
      ctx.quadraticCurveTo(xx+h.w/2, height-h.h, xx+h.w, height);
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();

    // flowers
    ctx.save();
    ctx.globalAlpha = .45;
    for(let i=0;i<16;i++){
      const x = (i*55 - bgT*60) % (width+30);
      const xx = x < -20 ? x + width + 30 : x;
      const y = height - 22 - (i%3)*5;
      ctx.fillStyle = i%2===0 ? "#ff6fa8" : "#ffd166";
      ctx.beginPath();
      ctx.arc(xx, y, 4, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.restore();
    return;
  }

  if(theme === 'lava'){
    const bg = ctx.createLinearGradient(0,0,0,height);
    bg.addColorStop(0,"#2b0d0d");
    bg.addColorStop(.5,"#4d1212");
    bg.addColorStop(1,"#120505");
    ctx.fillStyle = bg;
    ctx.fillRect(0,0,width,height);

    // smoke / embers
    for(const s of stars){
      const x = (s.x - bgT * (18 + s.speed*12)) % (width + 20);
      ctx.save();
      ctx.globalAlpha = .18 + .5*Math.abs(Math.sin(s.phase));
      ctx.fillStyle = s.c === COLORS.white ? "#ffb347" : "#ff6b35";
      ctx.beginPath();
      ctx.arc(x < 0 ? x + width + 20 : x, s.y, s.r+0.5, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    }

    // mountains
    ctx.save();
    ctx.fillStyle = "#2d1717";
    for(let i=0;i<6;i++){
      const x = i * (width/5) - bgT*10 % 20;
      ctx.beginPath();
      ctx.moveTo(x, height*0.62);
      ctx.lineTo(x+70, height*0.34);
      ctx.lineTo(x+150, height*0.62);
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();

    // lava river
    ctx.save();
    const lava = ctx.createLinearGradient(0,height*0.76,0,height);
    lava.addColorStop(0,"#ff6b00");
    lava.addColorStop(.5,"#ff3d00");
    lava.addColorStop(1,"#8a1f00");
    ctx.fillStyle = lava;
    ctx.fillRect(0,height*0.78,width,height*0.22);
    ctx.globalAlpha = .35;
    ctx.strokeStyle = "#ffd166";
    ctx.lineWidth = 4;
    for(let i=0;i<6;i++){
      ctx.beginPath();
      ctx.moveTo(-20, height*0.82 + i*18);
      ctx.bezierCurveTo(width*0.25, height*0.80 + i*16 + Math.sin(bgT*2+i)*8, width*0.6, height*0.86 + i*8, width+20, height*0.82 + i*16);
      ctx.stroke();
    }
    ctx.restore();
    return;
  }

  if(theme === 'ice'){
    const bg = ctx.createLinearGradient(0,0,0,height);
    bg.addColorStop(0,"#a7e7ff");
    bg.addColorStop(.48,"#d9f7ff");
    bg.addColorStop(1,"#eefcff");
    ctx.fillStyle = bg;
    ctx.fillRect(0,0,width,height);

    // aurora
    ctx.save();
    ctx.globalAlpha = .18;
    const aurora = ctx.createLinearGradient(0,0,width,0);
    aurora.addColorStop(0, "#71d8ff");
    aurora.addColorStop(.5, "#9fffe0");
    aurora.addColorStop(1, "#c8f2ff");
    ctx.strokeStyle = aurora;
    ctx.lineWidth = 70;
    ctx.lineCap = "round";
    ctx.beginPath();
    ctx.moveTo(-70, 90 + Math.sin(bgT*.8)*16);
    ctx.bezierCurveTo(width*.3, 20 + Math.sin(bgT*.6)*20, width*.65, 140 + Math.cos(bgT*.5)*18, width+90, 70 + Math.sin(bgT*.4)*12);
    ctx.stroke();
    ctx.restore();

    // snow particles
    for(const s of stars){
      const x = (s.x - bgT * 8) % (width + 20);
      const y = (s.y + bgT * (18 + s.speed*10)) % (height + 20);
      ctx.save();
      ctx.globalAlpha = .28 + .5*Math.abs(Math.sin(s.phase));
      ctx.fillStyle = "#ffffff";
      ctx.beginPath();
      ctx.arc(x < 0 ? x + width + 20 : x, y < 0 ? y + height + 20 : y, s.r+0.4, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    }

    // snow hills
    ctx.save();
    ctx.fillStyle = "#dff6ff";
    for(const h of hills2){
      const x = (h.x - bgT*18) % (width + 320);
      const xx = x < -220 ? x + width + 320 : x;
      ctx.beginPath();
      ctx.moveTo(xx, height);
      ctx.quadraticCurveTo(xx+h.w/2, height-h.h*1.05, xx+h.w, height);
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();

    ctx.save();
    ctx.fillStyle = "#b9e9ff";
    for(const h of hills1){
      const x = (h.x - bgT*34) % (width + 260);
      const xx = x < -180 ? x + width + 260 : x;
      ctx.beginPath();
      ctx.moveTo(xx, height);
      ctx.quadraticCurveTo(xx+h.w/2, height-h.h, xx+h.w, height);
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();
    return;
  }

  if(theme === 'sunset'){
    const bg = ctx.createLinearGradient(0,0,0,height);
    bg.addColorStop(0,"#ffbf80");
    bg.addColorStop(.35,"#ff9f7a");
    bg.addColorStop(.7,"#b35cff");
    bg.addColorStop(1,"#3b245d");
    ctx.fillStyle = bg;
    ctx.fillRect(0,0,width,height);

    // sun
    ctx.save();
    ctx.fillStyle = "#ffd166";
    ctx.shadowColor = "#ffd166";
    ctx.shadowBlur = 24;
    ctx.beginPath();
    ctx.arc(width*0.78, height*0.22, 44, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();

    // stars tiny
    for(const s of stars){
      const x = (s.x - bgT * (10 + s.speed*6)) % (width + 20);
      ctx.save();
      ctx.globalAlpha = .18 + .4*Math.abs(Math.sin(s.phase));
      ctx.fillStyle = "#fff3de";
      ctx.beginPath();
      ctx.arc(x < 0 ? x + width + 20 : x, s.y*0.8, s.r, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    }

    // mountains
    ctx.save();
    ctx.fillStyle = "#5e336a";
    for(const h of hills2){
      const x = (h.x - bgT*20) % (width + 320);
      const xx = x < -220 ? x + width + 320 : x;
      ctx.beginPath();
      ctx.moveTo(xx, height);
      ctx.quadraticCurveTo(xx+h.w/2, height-h.h*1.2, xx+h.w, height);
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();

    ctx.save();
    ctx.fillStyle = "#2f1d40";
    for(const h of hills1){
      const x = (h.x - bgT*38) % (width + 260);
      const xx = x < -180 ? x + width + 260 : x;
      ctx.beginPath();
      ctx.moveTo(xx, height);
      ctx.quadraticCurveTo(xx+h.w/2, height-h.h, xx+h.w, height);
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();
    return;
  }

  // default neon
  const bg = ctx.createLinearGradient(0,0,0,height);
  bg.addColorStop(0,"#112445");
  bg.addColorStop(.48,"#0c1730");
  bg.addColorStop(1,"#050913");
  ctx.fillStyle = bg;
  ctx.fillRect(0,0,width,height);

  ctx.save();
  ctx.globalAlpha = .16;
  const aurora = ctx.createLinearGradient(0,0,width,0);
  aurora.addColorStop(0, COLORS.cyan);
  aurora.addColorStop(.5, COLORS.pink);
  aurora.addColorStop(1, COLORS.gold);
  ctx.strokeStyle = aurora;
  ctx.lineWidth = 86;
  ctx.lineCap = "round";
  ctx.beginPath();
  ctx.moveTo(-70, 102 + Math.sin(bgT*.9)*18);
  ctx.bezierCurveTo(width*.25, 25 + Math.sin(bgT*.7)*24, width*.65, 170 + Math.cos(bgT*.58)*18, width+90, 90 + Math.sin(bgT*.44)*14);
  ctx.stroke();
  ctx.restore();

  for(const s of stars){
    const x = (s.x - bgT * (12 + s.speed*10)) % (width + 20);
    const tw = .25 + .65*Math.abs(Math.sin(s.phase));
    ctx.save();
    ctx.globalAlpha = tw;
    ctx.fillStyle = s.c;
    ctx.beginPath();
    ctx.arc(x < 0 ? x + width + 20 : x, s.y, s.r, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }

  ctx.save();
  ctx.fillStyle = "rgba(20,32,62,.65)";
  for(const h of hills2){
    const x = (h.x - bgT*22) % (width + 320);
    const xx = x < -220 ? x + width + 320 : x;
    ctx.beginPath();
    ctx.moveTo(xx, height);
    ctx.quadraticCurveTo(xx+h.w/2, height-h.h, xx+h.w, height);
    ctx.closePath();
    ctx.fill();
  }
  ctx.restore();

  ctx.save();
  ctx.fillStyle = "rgba(33,56,102,.58)";
  for(const h of hills1){
    const x = (h.x - bgT*42) % (width + 260);
    const xx = x < -180 ? x + width + 260 : x;
    ctx.beginPath();
    ctx.moveTo(xx, height);
    ctx.quadraticCurveTo(xx+h.w/2, height-h.h, xx+h.w, height);
    ctx.closePath();
    ctx.fill();
  }
  ctx.restore();

  const ground = ctx.createLinearGradient(0,height-120,0,height);
  ground.addColorStop(0,"rgba(53,231,255,0)");
  ground.addColorStop(1,"rgba(53,231,255,.10)");
  ctx.fillStyle = ground;
  ctx.fillRect(0,height-130,width,130);
}


function drawObstacle(ob){
  const count = ob.visualCount || 1;
  const pipeW = ob.pipeW || ob.w;
  const step = ob.visualStep || pipeW;
  const theme = ob.styleTheme || save.theme || 'neon';

  ctx.save();
  for(let j=0;j<count;j++){
    const x = ob.x + j*step;
    let gapY = ob.gapY;
    if(ob.gateKind === "stair"){
      const localStep = Math.min(28, height*0.040) * (ob.stairDir || 1);
      gapY = clampSectionY(ob.gapY + (j - (count-1)/2) * localStep, ob.gap);
    }

    const topH = gapY - ob.gap/2;
    const botY = gapY + ob.gap/2;
    const botH = height - botY;

    if(theme === 'nature'){
      drawNatureObstacle(x, 0, pipeW, topH, true);
      drawNatureObstacle(x, botY, pipeW, botH, false);
    }else if(theme === 'lava'){
      drawLavaObstacle(x, 0, pipeW, topH, true);
      drawLavaObstacle(x, botY, pipeW, botH, false);
    }else if(theme === 'ice'){
      drawIceObstacle(x, 0, pipeW, topH, true);
      drawIceObstacle(x, botY, pipeW, botH, false);
    }else if(theme === 'sunset'){
      drawSunsetObstacle(x, 0, pipeW, topH, true);
      drawSunsetObstacle(x, botY, pipeW, botH, false);
    }else{
      drawNeonObstacle(x, 0, pipeW, topH, ob, true);
      drawNeonObstacle(x, botY, pipeW, botH, ob, false);
    }
  }
  ctx.restore();
}

function drawGateBridge(ob, color, innerColor, edgeColor){
  const topH = ob.gapY - ob.gap/2;
  const botY = ob.gapY + ob.gap/2;

  ctx.save();
  ctx.shadowColor = color;
  ctx.shadowBlur = 18;
  ctx.strokeStyle = color;
  ctx.lineWidth = 5;
  ctx.lineCap = "round";
  ctx.beginPath();
  ctx.moveTo(ob.x+8, topH);
  ctx.lineTo(ob.x+ob.w-8, topH);
  ctx.moveTo(ob.x+8, botY);
  ctx.lineTo(ob.x+ob.w-8, botY);
  ctx.stroke();

  ctx.shadowBlur = 0;
  ctx.strokeStyle = innerColor;
  ctx.globalAlpha = .55;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(ob.x+12, topH+5);
  ctx.lineTo(ob.x+ob.w-12, topH+5);
  ctx.moveTo(ob.x+12, botY-5);
  ctx.lineTo(ob.x+ob.w-12, botY-5);
  ctx.stroke();

  // small corner nodes for premium feel
  const pts = [
    [ob.x+8, topH], [ob.x+ob.w-8, topH],
    [ob.x+8, botY], [ob.x+ob.w-8, botY]
  ];
  pts.forEach(([x,y])=>{
    ctx.fillStyle = edgeColor;
    ctx.shadowColor = color;
    ctx.shadowBlur = 12;
    ctx.beginPath();
    ctx.arc(x, y, 4, 0, Math.PI*2);
    ctx.fill();
  });

  if(ob.type === "pulse"){
    ctx.globalAlpha = .26 + Math.sin(bgT*4 + ob.phase)*.08;
    ctx.fillStyle = "#ffd166";
    ctx.shadowColor = "#ffd166";
    ctx.shadowBlur = 24;
    ctx.beginPath();
    ctx.arc(ob.x + ob.w/2, ob.gapY, 10, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.restore();
}

function drawRoundedPillarBody(x,y,w,h,fillTop,fillBottom,stroke,shadow){
  if(h <= 0) return;
  ctx.save();
  const grad = ctx.createLinearGradient(x,y,x+w,y+h);
  grad.addColorStop(0, fillTop);
  grad.addColorStop(1, fillBottom);
  ctx.fillStyle = grad;
  ctx.strokeStyle = stroke;
  ctx.shadowColor = shadow;
  ctx.shadowBlur = 18;
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.roundRect(x+3, y, w-6, h, 14);
  ctx.fill();
  ctx.stroke();
  ctx.restore();
}

function drawNeonObstacle(x,y,w,h,ob,top=true){
  if(h <= 0) return;
  const color = ob.type === "pulse" ? "#ffd166" : (ob.color || "#35e7ff");
  drawRoundedPillarBody(x,y,w,h,"rgba(255,255,255,.18)","rgba(6,16,31,.96)",color,color);

  ctx.save();
  ctx.globalAlpha = .5;
  ctx.fillStyle = color;
  ctx.shadowColor = color;
  ctx.shadowBlur = 20;
  const stripeCount = Math.max(3, Math.floor(h/42));
  for(let i=0;i<stripeCount;i++){
    const yy = y + 10 + i*((h-20)/stripeCount);
    ctx.beginPath();
    ctx.roundRect(x+10, yy, w-20, 8, 5);
    ctx.fill();
  }

  // core line
  ctx.globalAlpha = .35;
  ctx.fillStyle = "#ffffff";
  ctx.beginPath();
  ctx.roundRect(x+w*.42, y+8, w*.16, Math.max(0,h-16), 6);
  ctx.fill();
  ctx.restore();
}

function drawNatureObstacle(x,y,w,h,top=true){
  if(h <= 0) return;

  const v = Math.abs(Math.floor(x / 37)) % 4;
  const woodTop = v === 0 ? "#9b6b3d" : v === 1 ? "#80512e" : v === 2 ? "#a87542" : "#714421";
  const woodBot = v === 0 ? "#5c3b1e" : v === 1 ? "#4b2f19" : v === 2 ? "#6b421f" : "#3f2716";
  const leafColor = v === 0 ? "#54c76c" : v === 1 ? "#42b95f" : v === 2 ? "#66d47a" : "#2f9f52";

  drawRoundedPillarBody(x,y,w,h,woodTop,woodBot,"#d4a373","#8b5a2b");

  // leaves / kleine Variation, gleiche Hitbox
  ctx.save();
  ctx.fillStyle = leafColor;
  ctx.shadowColor = leafColor;
  ctx.shadowBlur = 10;
  const count = Math.max(3, Math.floor(h/55));
  for(let i=0;i<count;i++){
    const yy = y + 14 + i*((h-24)/count);
    const side = (i + v) % 2 === 0 ? -1 : 1;
    const lx = side < 0 ? x+8 : x+w-8;
    ctx.beginPath();
    ctx.ellipse(lx, yy, 7 + v, 13 + (v%2)*3, side<0 ? -.7 : .7, 0, Math.PI*2);
    ctx.fill();
  }

  // vines / Aststruktur
  ctx.strokeStyle = v % 2 === 0 ? "#2e8b57" : "#246b42";
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(x+w*(.22+.06*v), y);
  ctx.bezierCurveTo(x+w*.05, y+h*.25, x+w*.50, y+h*.55, x+w*.22, y+h);
  ctx.stroke();

  if(v === 2 || v === 3){
    ctx.globalAlpha = .45;
    ctx.strokeStyle = "#d4a373";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(x+w*.68, y+h*.18);
    ctx.lineTo(x+w*.42, y+h*.28);
    ctx.stroke();
  }
  ctx.restore();
}

function drawLavaObstacle(x,y,w,h,top=true){
  if(h <= 0) return;
  drawRoundedPillarBody(x,y,w,h,"#5b2b20","#1b0d0d","#ff6b00","#ff6b00");

  // obsidian cracks
  ctx.save();
  ctx.strokeStyle = "#ffb347";
  ctx.shadowColor = "#ff6b00";
  ctx.shadowBlur = 12;
  ctx.lineWidth = 2.4;
  const cracks = Math.max(3, Math.floor(h/60));
  for(let i=0;i<cracks;i++){
    const yy = y + 12 + i*((h-24)/cracks);
    ctx.beginPath();
    ctx.moveTo(x+w*.25, yy);
    ctx.lineTo(x+w*.55, yy+8);
    ctx.lineTo(x+w*.38, yy+18);
    ctx.lineTo(x+w*.7, yy+26);
    ctx.stroke();
  }
  ctx.restore();
}

function drawIceObstacle(x,y,w,h,top=true){
  if(h <= 0) return;
  drawRoundedPillarBody(x,y,w,h,"rgba(255,255,255,.88)","rgba(135,220,255,.92)","#8fe9ff","#8fe9ff");

  ctx.save();
  ctx.globalAlpha = .55;
  ctx.strokeStyle = "#ffffff";
  ctx.lineWidth = 2;
  const shards = Math.max(3, Math.floor(h/56));
  for(let i=0;i<shards;i++){
    const yy = y + 10 + i*((h-20)/shards);
    ctx.beginPath();
    ctx.moveTo(x+10, yy);
    ctx.lineTo(x+w*.5, yy+12);
    ctx.lineTo(x+w-10, yy);
    ctx.stroke();
  }
  ctx.restore();
}

function drawSunsetObstacle(x,y,w,h,top=true){
  if(h <= 0) return;
  drawRoundedPillarBody(x,y,w,h,"#6b4a7d","#2f1d40","#ffb067","#ffb067");

  // decorative soft bands
  ctx.save();
  ctx.globalAlpha = .45;
  const grad = ctx.createLinearGradient(x,y,x+w,y);
  grad.addColorStop(0,"#ffb067");
  grad.addColorStop(1,"#ffd166");
  ctx.fillStyle = grad;
  const bands = Math.max(3, Math.floor(h/50));
  for(let i=0;i<bands;i++){
    const yy = y + 10 + i*((h-20)/bands);
    ctx.beginPath();
    ctx.roundRect(x+8, yy, w-16, 10, 6);
    ctx.fill();
  }
  ctx.restore();
}

function drawSpeedLines(){

  if(status !== "playing" || score < 4) return;
  const amount = Math.min(18, 4 + Math.floor(score/2));
  ctx.save();
  ctx.globalAlpha = Math.min(.30, .08 + score*.008);
  ctx.strokeStyle = score >= 20 ? COLORS.red : score >= 10 ? COLORS.pink : COLORS.cyan;
  ctx.lineWidth = 2;
  for(let i=0;i<amount;i++){
    const y = (i * 47 + bgT * (80 + score*8)) % height;
    const x = width - ((i*67 + bgT*180) % (width+120));
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(x - 42 - score, y + 5);
    ctx.stroke();
  }
  ctx.restore();
}


function getPlayerAccent(){
  if(save.theme === 'lava') return '#ff8a3d';
  if(save.theme === 'nature') return '#54c76c';
  if(save.theme === 'ice') return '#8fe9ff';
  if(save.theme === 'sunset') return '#ffb067';
  return COLORS.cyan;
}

function drawTrail(){
  const accent = getPlayerAccent();
  for(let i=player.trail.length-1;i>=0;i--){
    const t = player.trail[i];
    const alpha = (1-i/player.trail.length)*.22;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = accent;
    ctx.shadowColor = accent;
    ctx.shadowBlur = 14;
    ctx.beginPath();
    ctx.arc(t.x, t.y, player.r*(1-i/player.trail.length*.55), 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
}
function drawPlayer(){
  const pulse = Math.sin(bgT*8)*1.3;
  const r = player.r + pulse;
  const accent = getPlayerAccent();
  const accent2 = save.theme === 'lava' ? '#ffd166'
                  : save.theme === 'nature' ? '#d8ffb7'
                  : save.theme === 'ice' ? '#ffffff'
                  : save.theme === 'sunset' ? '#ffe2b8'
                  : '#d8fbff';

  ctx.save();
  ctx.translate(player.x, player.y);
  ctx.rotate(player.rot);

  // shield aura
  if(shieldActive || shieldGraceTimer > 0){
    ctx.save();
    const auraColor = shieldGraceTimer > 0 ? "#c9ff7d" : "#8dff3a";
    const auraR = r + 14 + Math.sin(bgT*8)*2.2;
    ctx.globalAlpha = shieldGraceTimer > 0 ? .72 : .60;
    ctx.fillStyle = auraColor;
    ctx.shadowColor = auraColor;
    ctx.shadowBlur = 32;
    ctx.beginPath();
    ctx.arc(0, 0, auraR, 0, Math.PI*2);
    ctx.fill();

    ctx.globalAlpha = .95;
    ctx.strokeStyle = "#ffffff";
    ctx.lineWidth = 3.5;
    ctx.beginPath();
    ctx.arc(0, 0, auraR + 2, 0, Math.PI*2);
    ctx.stroke();

    ctx.lineWidth = 2.2;
    for(let i=0;i<6;i++){
      const ang = bgT*2 + i*(Math.PI*2/6);
      const x1 = Math.cos(ang) * (auraR + 2);
      const y1 = Math.sin(ang) * (auraR + 2);
      const x2 = Math.cos(ang) * (auraR + 10);
      const y2 = Math.sin(ang) * (auraR + 10);
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.stroke();
    }
    ctx.restore();
  }

  if(save.skin === 'comet'){
    // tail
    ctx.save();
    ctx.globalAlpha = .40;
    const tail = ctx.createLinearGradient(-r*5,0,0,0);
    tail.addColorStop(0, 'rgba(255,255,255,0)');
    tail.addColorStop(.55, accent);
    tail.addColorStop(1, accent2);
    ctx.fillStyle = tail;
    ctx.shadowColor = accent;
    ctx.shadowBlur = 26;
    ctx.beginPath();
    ctx.moveTo(-r*1.8,-r*.55);
    ctx.quadraticCurveTo(-r*4.2,-r*1.25,-r*5.1,0);
    ctx.quadraticCurveTo(-r*4.2,r*1.25,-r*1.8,r*.55);
    ctx.closePath();
    ctx.fill();
    ctx.restore();

    // core
    const grad = ctx.createRadialGradient(-r*.35,-r*.35,r*.15,0,0,r*1.55);
    grad.addColorStop(0, '#ffffff');
    grad.addColorStop(.35, accent2);
    grad.addColorStop(.85, accent);
    grad.addColorStop(1, '#5ee8ff');
    ctx.fillStyle = grad;
    ctx.shadowColor = accent;
    ctx.shadowBlur = 30;
    ctx.beginPath();
    ctx.arc(0,0,r*1.02,0,Math.PI*2);
    ctx.fill();

    // hot core
    ctx.fillStyle = 'rgba(255,255,255,.95)';
    ctx.beginPath();
    ctx.arc(-r*.15,-r*.12,r*.26,0,Math.PI*2);
    ctx.fill();

    // ring
    ctx.shadowBlur = 0;
    ctx.strokeStyle = 'rgba(255,255,255,.75)';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.arc(0,0,r*1.18,0,Math.PI*2);
    ctx.stroke();

  } else if(save.skin === 'cube'){
    // shadow glow
    ctx.save();
    ctx.shadowColor = accent;
    ctx.shadowBlur = 24;
    const grad = ctx.createLinearGradient(-r,-r,r,r);
    grad.addColorStop(0, '#ffffff');
    grad.addColorStop(.35, accent2);
    grad.addColorStop(1, accent);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.roundRect(-r*1.02,-r*1.02,r*2.04,r*2.04,7);
    ctx.fill();
    ctx.restore();

    // 3D face overlay
    ctx.save();
    ctx.globalAlpha = .38;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.moveTo(-r*.95,-r*.95);
    ctx.lineTo(r*.15,-r*.95);
    ctx.lineTo(r*.95,-r*.15);
    ctx.lineTo(r*.95,r*.95);
    ctx.lineTo(-r*.95,r*.95);
    ctx.closePath();
    ctx.fill();
    ctx.restore();

    ctx.strokeStyle = 'rgba(255,255,255,.82)';
    ctx.lineWidth = 2.4;
    ctx.beginPath();
    ctx.roundRect(-r*1.15,-r*1.15,r*2.3,r*2.3,9);
    ctx.stroke();

    // facet lines
    ctx.save();
    ctx.globalAlpha = .35;
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(-r*.7,-r*.4);
    ctx.lineTo(0,-r*.9);
    ctx.lineTo(r*.72,-r*.48);
    ctx.moveTo(0,-r*.9);
    ctx.lineTo(0,r*.92);
    ctx.moveTo(-r*.7,-r*.4);
    ctx.lineTo(0,.05);
    ctx.lineTo(r*.72,-r*.48);
    ctx.stroke();
    ctx.restore();

  } else if(save.skin === 'star'){
    // star glow
    ctx.save();
    ctx.shadowColor = accent;
    ctx.shadowBlur = 28;
    const grad = ctx.createRadialGradient(0,0,r*.1,0,0,r*1.6);
    grad.addColorStop(0, '#ffffff');
    grad.addColorStop(.3, accent2);
    grad.addColorStop(1, accent);
    ctx.fillStyle = grad;
    ctx.beginPath();
    for(let i=0;i<10;i++){
      const rr = i % 2 === 0 ? r*1.24 : r*.52;
      const a = -Math.PI/2 + i*Math.PI/5;
      const x = Math.cos(a)*rr;
      const y = Math.sin(a)*rr;
      if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    }
    ctx.closePath();
    ctx.fill();
    ctx.restore();

    // center gem
    ctx.save();
    ctx.fillStyle = '#ffffff';
    ctx.globalAlpha = .9;
    ctx.beginPath();
    ctx.arc(0,0,r*.32,0,Math.PI*2);
    ctx.fill();
    ctx.restore();

    // outline
    ctx.strokeStyle = 'rgba(255,255,255,.78)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    for(let i=0;i<10;i++){
      const rr = i % 2 === 0 ? r*1.32 : r*.56;
      const a = -Math.PI/2 + i*Math.PI/5;
      const x = Math.cos(a)*rr;
      const y = Math.sin(a)*rr;
      if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    }
    ctx.closePath();
    ctx.stroke();

  } else if(save.skin === 'ufo'){
    // beam
    ctx.save();
    ctx.globalAlpha = .18 + Math.abs(Math.sin(bgT*6))* .12;
    const beam = ctx.createLinearGradient(0,-r*.2,0,r*2.7);
    beam.addColorStop(0, 'rgba(255,255,255,.18)');
    beam.addColorStop(1, 'rgba(53,231,255,0)');
    ctx.fillStyle = beam;
    ctx.beginPath();
    ctx.moveTo(-r*.55,r*.2);
    ctx.lineTo(r*.55,r*.2);
    ctx.lineTo(r*1.35,r*2.4);
    ctx.lineTo(-r*1.35,r*2.4);
    ctx.closePath();
    ctx.fill();
    ctx.restore();

    // hull
    ctx.save();
    ctx.shadowColor = accent;
    ctx.shadowBlur = 24;
    const hull = ctx.createLinearGradient(-r,0,r,0);
    hull.addColorStop(0, accent2);
    hull.addColorStop(.55, '#ffffff');
    hull.addColorStop(1, accent);
    ctx.fillStyle = hull;
    ctx.beginPath();
    ctx.ellipse(0, r*.18, r*1.45, r*.68, 0, 0, Math.PI*2);
    ctx.fill();

    // dome
    const dome = ctx.createLinearGradient(0,-r,0,r*.15);
    dome.addColorStop(0, 'rgba(255,255,255,.95)');
    dome.addColorStop(1, 'rgba(160,240,255,.88)');
    ctx.fillStyle = dome;
    ctx.beginPath();
    ctx.ellipse(0, -r*.22, r*.78, r*.58, 0, Math.PI, 0, true);
    ctx.fill();
    ctx.restore();

    // lights
    const lights = [-.72,-.24,.24,.72];
    lights.forEach((m,i)=>{
      ctx.fillStyle = i%2===0 ? accent : '#ffd166';
      ctx.shadowColor = ctx.fillStyle;
      ctx.shadowBlur = 12;
      ctx.beginPath();
      ctx.arc(r*m, r*.38, r*.12, 0, Math.PI*2);
      ctx.fill();
    });

    ctx.strokeStyle = 'rgba(255,255,255,.75)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.ellipse(0, r*.18, r*1.45, r*.68, 0, 0, Math.PI*2);
    ctx.stroke();

  } else { // orb
    // tail aura
    ctx.save();
    ctx.globalAlpha = .32;
    const tail = ctx.createLinearGradient(-r*3.2,0,0,0);
    tail.addColorStop(0,'rgba(255,255,255,0)');
    tail.addColorStop(.6, accent);
    tail.addColorStop(1, accent2);
    ctx.fillStyle = tail;
    ctx.shadowColor = accent;
    ctx.shadowBlur = 24;
    ctx.beginPath();
    ctx.moveTo(-r*1.5,0);
    ctx.quadraticCurveTo(-r*3.0,-r*0.95,-r*3.55,0);
    ctx.quadraticCurveTo(-r*3.0,r*0.95,-r*1.5,0);
    ctx.fill();
    ctx.restore();

    // orb core
    ctx.shadowColor = accent;
    ctx.shadowBlur = 28;
    const grad = ctx.createRadialGradient(-r*.38,-r*.38,r*.15,0,0,r*1.5);
    grad.addColorStop(0, '#ffffff');
    grad.addColorStop(.3, accent2);
    grad.addColorStop(.72, accent);
    grad.addColorStop(1, '#243a7a');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(0,0,r*1.02,0,Math.PI*2);
    ctx.fill();

    // outer ring
    ctx.shadowBlur = 0;
    ctx.strokeStyle = 'rgba(255,255,255,.72)';
    ctx.lineWidth = 2.4;
    ctx.beginPath();
    ctx.arc(0,0,r*1.18,0,Math.PI*2);
    ctx.stroke();

    // highlight
    ctx.save();
    ctx.globalAlpha = .82;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(-r*.28,-r*.30,r*.23,0,Math.PI*2);
    ctx.fill();
    ctx.restore();

    // eye
    ctx.fillStyle = '#07101f';
    ctx.beginPath();
    ctx.arc(r*0.24,-r*0.10, r*0.18, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(r*0.31,-r*0.18, r*0.06, 0, Math.PI*2);
    ctx.fill();
  }

  ctx.restore();
}
function drawParticles(){
  for(const p of particles){
    ctx.save();
    ctx.globalAlpha = Math.max(0,p.life);
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
}
function drawShockwaves(){
  for(const s of shockwaves){
    ctx.save();
    ctx.globalAlpha = Math.max(0,s.life);
    ctx.strokeStyle = s.color;
    ctx.lineWidth = s.big ? 5 : 3;
    ctx.shadowColor = s.color;
    ctx.shadowBlur = 18;
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.stroke();
    ctx.restore();
  }
}

function draw(){
  if(!ctx) return;
  let sx=0, sy=0;
  if(screenShake > 0){
    sx = rand(-8,8)*screenShake;
    sy = rand(-6,6)*screenShake;
  }

  ctx.clearRect(0,0,width,height);
  ctx.save();
  ctx.translate(sx,sy);

  drawBackground();

  for(const ob of obstacles){
    drawObstacle(ob);
    drawGateCoins(ob);
  }
  drawPowerups();
  drawShockwaves();
  drawSpeedLines();
  if(player){
    drawTrail();
    drawPlayer();
  }
  drawParticles();
  drawCoinPopups();

  // top and bottom boundary glow
  ctx.save();
  ctx.globalAlpha = .35;
  const g1 = ctx.createLinearGradient(0,0,0,16);
  g1.addColorStop(0, COLORS.pink); g1.addColorStop(1, "rgba(255,79,216,0)");
  ctx.fillStyle = g1;
  ctx.fillRect(0,0,width,16);

  const g2 = ctx.createLinearGradient(0,height-16,0,height);
  g2.addColorStop(0, "rgba(53,231,255,0)"); g2.addColorStop(1, COLORS.cyan);
  ctx.fillStyle = g2;
  ctx.fillRect(0,height-16,width,16);
  ctx.restore();

  ctx.restore();
}

function loop(t=0){
  const dt = Math.min(.033, (t-lastTime)/1000 || 0);
  lastTime = t;
  update(dt);
  updateAmbientMusic();
  draw();
  requestAnimationFrame(loop);
}

function onTap(e){
  if(e && e.preventDefault) e.preventDefault();

  // Wichtig: Klicks im Menü/Ranking dürfen NICHT als Spiel-Tap zählen.
  if(e && e.target && e.target.closest && e.target.closest(".overlay")){
    return;
  }

  tapFly();
}

// Overlay komplett vom Spiel-Tap trennen
els.overlay.addEventListener("pointerdown", function(e){
  e.stopPropagation();
});
els.overlay.addEventListener("click", function(e){
  e.stopPropagation();
});

els.touchArea.addEventListener("pointerdown", onTap);
document.getElementById("startBtn").onclick = ()=>{ unlockAudio(); startGame(); };
document.getElementById("restartBtn").onclick = ()=>{ unlockAudio(); startGame(); };
document.getElementById("soundBtn").onclick = ()=>toggleSound();
document.getElementById("musicBtn").onclick = ()=>toggleMusic();
document.getElementById("menuBtn").onclick = ()=>showMenu();

window.addEventListener("keydown", e=>{
  if(e.code === "Space" || e.key === "Enter"){
    e.preventDefault();
    unlockAudio();
    onTap();
  }
  if(e.key.toLowerCase() === "r") startGame();
  if(e.key.toLowerCase() === "m") showMenu();
  if(e.key.toLowerCase() === "s") toggleSound();
});

resize();
updateHud();
showMenu();
requestAnimationFrame(loop);
</script>

<script>
window.addEventListener("load", function(){
  setTimeout(function(){
    try{ if(typeof showMenu === "function") showMenu(); }catch(e){}
  }, 250);
});
</script>
