<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<title>Orbit Tap Classic Flappy Geometry</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#050913;color:white;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;touch-action:none;user-select:none}
canvas{position:fixed;inset:0;width:100vw;height:100dvh;display:block;background:#050913}
#score{position:fixed;top:calc(env(safe-area-inset-top,0px) + 62px);left:0;right:0;text-align:center;z-index:5;font-size:60px;font-weight:1000;line-height:1;color:#fff;letter-spacing:-.08em;text-shadow:-4px -4px 0 #111,4px -4px 0 #111,-4px 4px 0 #111,4px 4px 0 #111,0 8px 0 rgba(0,0,0,.25);pointer-events:none}
#hud{position:fixed;top:calc(env(safe-area-inset-top,0px) + 10px);left:10px;right:10px;z-index:6;display:flex;justify-content:space-between;gap:6px;pointer-events:none}
.pill{border:1px solid rgba(255,255,255,.13);background:rgba(8,15,29,.48);border-radius:999px;padding:7px 9px;font-size:11px;font-weight:900;color:#e5f7ff;backdrop-filter:blur(10px)}
#overlay{position:fixed;inset:0;z-index:20;display:flex;align-items:center;justify-content:center;padding:calc(env(safe-area-inset-top,0px) + 12px) 12px calc(env(safe-area-inset-bottom,0px) + 12px);background:radial-gradient(circle at 50% 0%,rgba(53,231,255,.16),transparent 34%),radial-gradient(circle at 90% 15%,rgba(255,79,216,.12),transparent 28%),rgba(2,6,23,.88)}
#overlay.hide{display:none}
.modal{width:min(94vw,430px);max-height:calc(100dvh - env(safe-area-inset-top,0px) - env(safe-area-inset-bottom,0px) - 28px);overflow:auto;border:1px solid rgba(255,255,255,.16);background:linear-gradient(160deg,rgba(255,255,255,.14),rgba(255,255,255,.06));border-radius:32px;padding:18px;box-shadow:0 24px 80px rgba(0,0,0,.45)}
.logo{display:flex;align-items:center;gap:12px;margin-bottom:14px}.orbLogo{width:62px;height:62px;border-radius:24px;background:radial-gradient(circle at 35% 25%,#fff,#35e7ff 42%,#ff4fd8);box-shadow:0 0 34px rgba(53,231,255,.28)}
h1{margin:0;font-size:34px;line-height:.95;letter-spacing:-.08em}.sub{color:#94a3b8;font-size:13px;font-weight:800;margin-top:4px}
.mark{margin-top:10px;padding:10px 12px;border-radius:16px;border:1px solid rgba(53,231,255,.35);background:rgba(53,231,255,.12);color:#bff7ff;font-size:13px;font-weight:1000;text-align:center}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.box{border:1px solid rgba(255,255,255,.13);background:rgba(2,6,23,.30);border-radius:18px;padding:11px 8px;text-align:center}.box b{display:block;font-size:26px;line-height:1;color:#fff}.box span{display:block;margin-top:5px;color:#94a3b8;font-size:10px;font-weight:900;letter-spacing:.12em;text-transform:uppercase}
button{border:0;border-radius:22px;color:white;font-weight:1000;background:linear-gradient(135deg,#35e7ff,#ff4fd8);box-shadow:0 18px 42px rgba(0,0,0,.35);cursor:pointer}.play{width:100%;min-height:64px;font-size:20px;margin-top:14px}
.grid,.themes{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}.small,.theme{min-height:48px;font-size:12px;background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.14);box-shadow:none}.theme.active{background:rgba(53,231,255,.20);border-color:rgba(53,231,255,.45)}
.note{margin-top:12px;color:#94a3b8;font-size:12px;line-height:1.35}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="hud"><div class="pill">🪙 <span id="coinHud">0</span></div><div class="pill">🛡️ <span id="shieldHud">0</span>s</div><div class="pill">Best <span id="bestHud">0</span></div></div>
<div id="score">0</div>
<div id="overlay"><div class="modal">
  <div class="logo"><div class="orbLogo"></div><div><h1>Orbit Tap</h1><div class="sub">Classic Flappy Geometry</div></div></div>
  <div class="mark">CLASSIC FLAPPY GEOMETRY aktiv</div>
  <div class="stats"><div class="box"><b id="lastScoreBox">0</b><span>Letzter Score</span></div><div class="box"><b id="bestScoreBox">0</b><span>Best</span></div></div>
  <button class="play" id="playBtn">SPIEL STARTEN</button>
  <div class="grid"><button class="small" id="resetBtn">Reset</button><button class="small" id="muteBtn">Sound an/aus</button></div>
  <div class="note">Konstante Geschwindigkeit · konstante Physik · feste Gate-Größe · fester Abstand · nur die Höhe variiert.</div>
  <div class="themes">
    <button class="theme" data-theme="sunny">☀️ Sunny</button>
    <button class="theme" data-theme="galaxy">🌌 Galaxy</button>
    <button class="theme" data-theme="winter">❄️ Winter</button>
    <button class="theme" data-theme="sunset">🌇 Sunset</button>
  </div>
</div></div>
<script>
(()=>{
const canvas=document.getElementById("game"),ctx=canvas.getContext("2d"),overlay=document.getElementById("overlay");
const scoreEl=document.getElementById("score"),coinHud=document.getElementById("coinHud"),shieldHud=document.getElementById("shieldHud"),bestHud=document.getElementById("bestHud"),lastScoreBox=document.getElementById("lastScoreBox"),bestScoreBox=document.getElementById("bestScoreBox");
const KEY="orbitTapClassicFlappyGeometry_v1";
const save=JSON.parse(localStorage.getItem(KEY)||"{}");
save.best=save.best||0;save.last=save.last||0;save.coins=save.coins||0;save.theme=save.theme||"sunny";save.mute=!!save.mute;
let W=0,H=0,dpr=1,running=false,t=0,score=0,gates=[],coins=[],parts=[],last=0,nextGateX=0,shieldTimer=0,gatesSinceShield=99,audio=null;
let player={x:0,y:0,r:14,vy:0,rot:0};

function saveNow(){localStorage.setItem(KEY,JSON.stringify(save))}
function fit(){dpr=Math.min(2,window.devicePixelRatio||1);W=innerWidth;H=innerHeight;canvas.width=Math.floor(W*dpr);canvas.height=Math.floor(H*dpr);canvas.style.width=W+"px";canvas.style.height=H+"px";ctx.setTransform(dpr,0,0,dpr,0,0);player.x=W*.30;if(!running)player.y=H*.46;player.r=Math.max(12,Math.min(18,W*.038))}
function rand(a,b){return a+Math.random()*(b-a)}
function gateW(){return W*.18}
function gapH(){return Math.max(118,Math.min(156,H*.205))}
function spacing(){return W*.61}
function speed(){return W*.36}
function gravity(){return H*1.12}
function impulse(){return -Math.min(H*.52,310)}
function terminal(){return H*.95}
function safe(){return H*.10}
function gapY(){const g=gapH();return rand(safe()+g/2,H-safe()-g/2)}
function theme(){if(save.theme==="galaxy")return{bg1:"#070b20",bg2:"#161144",gate:"#35e7ff",edge:"#fff",dark:"#07182c",kind:"galaxy",glow:1};if(save.theme==="winter")return{bg1:"#dff8ff",bg2:"#76c8ff",gate:"#9be8ff",edge:"#fff",dark:"#0b2f43",kind:"winter"};if(save.theme==="sunset")return{bg1:"#ff9f5a",bg2:"#4b164d",gate:"#171827",edge:"#ffd166",dark:"#070710",kind:"sunset"};return{bg1:"#79d8ff",bg2:"#baf4ff",gate:"#35d07f",edge:"#eaffef",dark:"#0f3b26",kind:"sunny"}}

function resetRun(){score=0;gates=[];coins=[];parts=[];shieldTimer=0;gatesSinceShield=99;player.x=W*.30;player.y=H*.46;player.vy=0;player.rot=0;nextGateX=W+gateW();spawnGate(nextGateX);nextGateX+=spacing();scoreEl.textContent="0";updateHud()}
function spawnGate(x){const g=gapH(),y=gapY(),w=gateW(),i=gates.length;gates.push({x,w,gap:g,gapY:y,passed:false,power:false});if(Math.random()<.55)coins.push({x:x+w/2,y:y+rand(-g*.18,g*.18),r:7,taken:false});gatesSinceShield++;if(gatesSinceShield>=12){coins.push({x:x+w/2,y:y,r:13,taken:false,shield:true});gatesSinceShield=0}}
function start(){overlay.classList.add("hide");running=true;resetRun();last=performance.now();requestAnimationFrame(loop)}
function gameOver(){running=false;save.last=score;save.best=Math.max(save.best,score);saveNow();updateMenu();overlay.classList.remove("hide")}
function tap(){if(!running)return;player.vy=impulse();beep(220,.035,.05)}
function update(dt){t+=dt;player.vy+=gravity()*dt;player.vy=Math.min(player.vy,terminal());player.y+=player.vy*dt;player.rot=Math.max(-.45,Math.min(1.35,player.vy/420));
 const v=speed();for(const g of gates)g.x-=v*dt;for(const c of coins)c.x-=v*dt;if(gates[gates.length-1].x<nextGateX-spacing()){spawnGate(nextGateX);nextGateX+=spacing()}gates=gates.filter(g=>g.x+g.w>-20);coins=coins.filter(c=>c.x>-30&&!c.taken);parts=parts.filter(p=>p.life>0);for(const p of parts){p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=dt}if(shieldTimer>0)shieldTimer=Math.max(0,shieldTimer-dt);
 for(const g of gates){if(!g.passed&&g.x+g.w<player.x){g.passed=true;score++;scoreEl.textContent=score;if(score>save.best)save.best=score;updateHud();beep(440,.035,.04)}}
 for(const c of coins){if(Math.hypot(c.x-player.x,c.y-player.y)<c.r+player.r*.9){c.taken=true;if(c.shield){shieldTimer=10;burst(c.x,c.y,"#73ff9b");beep(660,.05,.06)}else{save.coins++;saveNow();burst(c.x,c.y,"#ffd166");beep(520,.03,.04)}updateHud()}}
 let hit=false,hr=player.r*.92;if(player.y-hr<0||player.y+hr>H)hit=true;for(const g of gates){if(player.x+hr>g.x&&player.x-hr<g.x+g.w){const top=g.gapY-g.gap/2,bottom=g.gapY+g.gap/2;if(player.y-hr<top||player.y+hr>bottom){hit=true;break}}}
 if(hit){if(shieldTimer>0){shieldTimer=Math.max(0,shieldTimer-1.2);player.vy=impulse()*.55;burst(player.x,player.y,"#73ff9b");updateHud()}else{burst(player.x,player.y,"#ff4fd8");gameOver()}}}
function burst(x,y,color){for(let i=0;i<18;i++){const a=Math.random()*Math.PI*2,s=rand(60,180);parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:rand(.25,.55),color})}}

function bg(st){const gr=ctx.createLinearGradient(0,0,0,H);gr.addColorStop(0,st.bg1);gr.addColorStop(1,st.bg2);ctx.fillStyle=gr;ctx.fillRect(0,0,W,H);if(st.kind==="galaxy"){ctx.fillStyle="rgba(255,255,255,.65)";for(let i=0;i<55;i++){ctx.fillRect((i*97+t*18)%(W+20)-10,(i*53)%H,1.5,1.5)}}else if(st.kind==="sunny"){ctx.fillStyle="rgba(255,255,255,.38)";for(let i=0;i<6;i++){let x=(i*130-t*18)%(W+180)-90,y=55+(i%3)*42;ctx.beginPath();ctx.ellipse(x,y,38,13,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(x+25,y+4,30,10,0,0,Math.PI*2);ctx.fill()}}else if(st.kind==="winter"){ctx.fillStyle="rgba(255,255,255,.55)";for(let i=0;i<35;i++){ctx.beginPath();ctx.arc((i*41+t*10)%W,(i*71+t*24)%H,1.5,0,Math.PI*2);ctx.fill()}}else if(st.kind==="sunset"){ctx.fillStyle="rgba(0,0,0,.18)";for(let i=0;i<7;i++){let x=(i*80-t*16)%(W+120)-60;ctx.fillRect(x,H-90-(i%3)*18,46,120)}}}
function drawGate(g,st){const top=g.gapY-g.gap/2,bot=g.gapY+g.gap/2,x=g.x,w=g.w,lip=Math.max(7,w*.1);const gt=ctx.createLinearGradient(x,0,x+w,Math.max(1,top));gt.addColorStop(0,"rgba(255,255,255,.18)");gt.addColorStop(.45,st.gate);gt.addColorStop(1,st.dark);const gb=ctx.createLinearGradient(x,bot,x+w,H);gb.addColorStop(0,"rgba(255,255,255,.15)");gb.addColorStop(.45,st.gate);gb.addColorStop(1,st.dark);ctx.save();ctx.shadowColor=st.gate;ctx.shadowBlur=st.glow?18:8;ctx.strokeStyle=st.edge;ctx.lineWidth=2;ctx.fillStyle=gt;ctx.fillRect(x,0,w,top);ctx.strokeRect(x,0,w,top);ctx.fillStyle=gb;ctx.fillRect(x,bot,w,H-bot);ctx.strokeRect(x,bot,w,H-bot);ctx.fillStyle=st.gate;ctx.lineWidth=3;ctx.fillRect(x-lip/2,top-lip,w+lip,lip);ctx.strokeRect(x-lip/2,top-lip,w+lip,lip);ctx.fillRect(x-lip/2,bot,w+lip,lip);ctx.strokeRect(x-lip/2,bot,w+lip,lip);ctx.shadowBlur=0;ctx.globalAlpha=.24;ctx.strokeStyle="#fff";ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(x+w*.25,8);ctx.lineTo(x+w*.25,Math.max(10,top-lip-8));ctx.moveTo(x+w*.25,bot+lip+8);ctx.lineTo(x+w*.25,H-8);ctx.stroke();ctx.globalAlpha=1;if(st.kind==="winter"){ctx.globalAlpha=.55;ctx.fillStyle="#e9fbff";for(let i=0;i<4;i++){const sx=x+(i+.5)*w/4;ctx.beginPath();ctx.moveTo(sx-w*.06,top);ctx.lineTo(sx+w*.06,top);ctx.lineTo(sx,Math.min(top+16,g.gapY-g.gap*.34));ctx.closePath();ctx.fill()}ctx.globalAlpha=1}ctx.restore()}
function drawPlayer(){ctx.save();ctx.translate(player.x,player.y);ctx.rotate(player.rot);if(shieldTimer>0){ctx.strokeStyle="rgba(115,255,155,.8)";ctx.lineWidth=3;ctx.shadowColor="#73ff9b";ctx.shadowBlur=18;ctx.beginPath();ctx.arc(0,0,player.r+8,0,Math.PI*2);ctx.stroke()}ctx.shadowColor="#35e7ff";ctx.shadowBlur=15;ctx.fillStyle="#35e7ff";ctx.beginPath();ctx.arc(0,0,player.r,0,Math.PI*2);ctx.fill();ctx.fillStyle="#fff";ctx.beginPath();ctx.arc(player.r*.25,-player.r*.25,player.r*.25,0,Math.PI*2);ctx.fill();ctx.restore()}
function drawItems(){for(const c of coins){ctx.save();ctx.translate(c.x,c.y);ctx.shadowColor=c.shield?"#73ff9b":"#ffd166";ctx.shadowBlur=14;ctx.fillStyle=c.shield?"#73ff9b":"#ffd166";if(c.shield){ctx.beginPath();ctx.moveTo(0,-c.r);ctx.lineTo(c.r*.85,-c.r*.25);ctx.lineTo(c.r*.55,c.r);ctx.lineTo(0,c.r*.65);ctx.lineTo(-c.r*.55,c.r);ctx.lineTo(-c.r*.85,-c.r*.25);ctx.closePath();ctx.fill()}else{ctx.beginPath();ctx.arc(0,0,c.r,0,Math.PI*2);ctx.fill()}ctx.restore()}}
function drawParts(){for(const p of parts){ctx.globalAlpha=Math.max(0,p.life*2);ctx.fillStyle=p.color;ctx.fillRect(p.x,p.y,3,3)}ctx.globalAlpha=1}
function render(){const st=theme();bg(st);for(const g of gates)drawGate(g,st);drawItems();drawPlayer();drawParts()}
function loop(now){if(!running)return;const dt=Math.min(.033,(now-last)/1000||.016);last=now;update(dt);render();if(running)requestAnimationFrame(loop)}
function updateHud(){coinHud.textContent=save.coins||0;shieldHud.textContent=Math.ceil(shieldTimer||0);bestHud.textContent=save.best||0}
function updateMenu(){lastScoreBox.textContent=save.last||0;bestScoreBox.textContent=save.best||0;updateHud();document.querySelectorAll(".theme").forEach(b=>b.classList.toggle("active",b.dataset.theme===save.theme))}
function beep(freq,dur,vol){if(save.mute)return;try{audio=audio||new (window.AudioContext||window.webkitAudioContext)();const o=audio.createOscillator(),g=audio.createGain();o.frequency.value=freq;o.type="sine";g.gain.value=vol;o.connect(g);g.connect(audio.destination);o.start();o.stop(audio.currentTime+dur)}catch(e){}}

addEventListener("resize",fit);
addEventListener("pointerdown",e=>{if(!overlay.contains(e.target))tap()},{passive:false});
addEventListener("keydown",e=>{if(e.code==="Space"){e.preventDefault();running?tap():start()}});
document.getElementById("playBtn").onclick=start;
document.getElementById("resetBtn").onclick=()=>{save.best=0;save.last=0;save.coins=0;saveNow();updateMenu()};
document.getElementById("muteBtn").onclick=()=>{save.mute=!save.mute;saveNow()};
document.querySelectorAll(".theme").forEach(b=>b.onclick=()=>{save.theme=b.dataset.theme;saveNow();updateMenu();render()});
fit();updateMenu();render();
})();
</script>
</body>
</html>
